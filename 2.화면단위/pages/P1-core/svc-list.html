<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>KOCOM CS</title>
  <script src="../../_shared/libs/tailwind.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        'k-primary': '#6699FF', 'k-active': '#5acd3e',
        'k-border': '#d7d7d7', 'k-text': '#333333',
        'k-sub': '#545454', 'k-bg': '#f2f2f2', 'k-header': '#f3f3f3',
      }}}
    }
  </script>
  <script defer src="../../_shared/libs/alpine.js"></script>
  <script src="../../../_shared/mock-data.js"></script>
  <style>
    body { font-size: 12px; font-family: 'Malgun Gothic', sans-serif; color: #333; }
    .tbl-wrap { overflow-x: auto; width: 100%; }
    table.svc-tbl { border-collapse: collapse; min-width: 2800px; width: 2800px; }
    table.svc-tbl thead th {
      background: #f3f3f3;
      border-top: 1px solid #cfcfcf;
      border-bottom: 1px solid #d7d7d7;
      border-left: 1px solid #e7e7e7;
      color: #545454;
      font-weight: bold;
      padding: 5px 4px;
      white-space: nowrap;
      text-align: center;
    }
    table.svc-tbl thead th:first-child { border-left: 0; }
    table.svc-tbl tbody td {
      border-bottom: 1px solid #d7d7d7;
      border-left: 1px solid #e7e7e7;
      color: #545454;
      font-weight: bold;
      padding: 3px 4px;
      text-align: center;
      white-space: nowrap;
    }
    table.svc-tbl tbody td:first-child { border-left: 0; }
    table.svc-tbl tbody tr:nth-child(even) { background-color: #FBF9C4; }
    table.svc-tbl tbody tr:hover { background-color: #FFF59D !important; }
    table.svc-tbl tbody td.left { text-align: left; padding-left: 4px; }
    .receipt-no-link { color: #6699FF; cursor: pointer; text-decoration: underline; font-weight: bold; }
    .process-no-link { color: #5acd3e; cursor: pointer; text-decoration: underline; }
    .badge-urgent { color: #FF0000; font-weight: bold; }
    .badge-strong { color: #0000FF; font-weight: bold; }
    .badge-normal { color: #545454; }
    .search-label { font-size: 12px; font-weight: bold; color: #333; white-space: nowrap; }
    select, input[type=text] {
      border: 1px solid #ccc;
      padding: 2px 4px;
      font-size: 12px;
      height: 24px;
      border-radius: 2px;
    }
    .btn-primary {
      background: #6699FF; color: #fff; border: none;
      padding: 4px 12px; border-radius: 2px; cursor: pointer; font-size: 12px; font-weight: bold;
    }
    .btn-primary:hover { background: #4477dd; }
    .btn-excel {
      background: #5acd3e; color: #fff; border: none;
      padding: 4px 12px; border-radius: 2px; cursor: pointer; font-size: 12px; font-weight: bold;
    }
    .btn-excel:hover { background: #3fa82e; }
    .btn-receipt {
      background: #6699FF; color: #fff; border: none;
      padding: 5px 14px; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold;
    }
    .btn-receipt:hover { background: #4477dd; }
    .page-header {
      background: #f3f3f3;
      border-bottom: 1px solid #d7d7d7;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 { font-size: 16px; font-weight: bold; color: #333; }
    .search-bar {
      background: #fafafa;
      border-bottom: 1px solid #d7d7d7;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .result-bar {
      padding: 6px 16px;
      font-size: 12px;
      color: #333;
      font-weight: bold;
      border-bottom: 1px solid #e7e7e7;
      background: #fff;
    }
    .pagination { display: flex; gap: 2px; align-items: center; justify-content: center; padding: 10px 0; }
    .page-btn {
      border: 1px solid #d7d7d7;
      background: #fff;
      color: #333;
      padding: 3px 8px;
      cursor: pointer;
      font-size: 12px;
      border-radius: 2px;
    }
    .page-btn.active { background: #6699FF; color: #fff; border-color: #6699FF; font-weight: bold; }
    .page-btn:hover:not(.active) { background: #f2f2f2; }
    /* 판매유형 배지 */
    .sell-hn { color: #6699FF; font-weight: bold; }
    .sell-special { color: #cc6600; font-weight: bold; }
    .sell-market { color: #009900; font-weight: bold; }
    /* 자재신청 배지 */
    .jaje-done { color: #009900; font-weight: bold; }
    .jaje-ing { color: #cc6600; font-weight: bold; }
    .jaje-wait { color: #999; }
    /* 승인 */
    .approve-y { color: #009900; font-weight: bold; }
    .approve-n { color: #cc0000; font-weight: bold; }
  </style>
</head>
<body class="bg-white">

<div x-data="{
  allRows: window.MOCK ? MOCK.svcList : [],
  rows: [],
  selectedRow: null,
  sday: '2026-04-01',
  eday: '2026-04-15',
  rctgbn: '',
  jajeStatus: '',
  keyfield: '',
  keyword: '',
  currentPage: 1,
  pageSize: 15,
  init() {
    this.doSearch();
  },
  doSearch() {
    this.rows = this.allRows.filter(r => {
      if (this.rctgbn && r.receiptType !== this.rctgbn) return false;
      if (this.jajeStatus) {
        const jajeMap = { '신청완료':'Y','신청중':'P','신청대기':'' };
        /* 간단히 mock에서 jajeStatus 필드가 없으므로 processNo 유무로 대체 */
        if (this.jajeStatus === 'Y' && !r.processNo) return false;
        if (this.jajeStatus === 'N' && r.processNo) return false;
      }
      if (this.keyword && this.keyfield) {
        const kw = this.keyword.toLowerCase();
        const fieldMap = {
          '1': 'receiptNo', '2': 'engineer', '3': 'customerName',
          '4': 'callerNo', '5': 'mobile', '6': 'address'
        };
        const field = fieldMap[this.keyfield];
        if (field && !String(r[field]).toLowerCase().includes(kw)) return false;
      }
      return true;
    });
    this.currentPage = 1;
  },
  get totalCount() { return this.rows.length; },
  get pagedRows() {
    const s = (this.currentPage - 1) * this.pageSize;
    return this.rows.slice(s, s + this.pageSize);
  },
  get totalPages() { return Math.max(1, Math.ceil(this.rows.length / this.pageSize)); },
  goPage(p) { if (p >= 1 && p <= this.totalPages) this.currentPage = p; },
  receiptTypeLabel(t) {
    const m = {T:'전화',P:'우편',F:'팩스',L:'LED',S:'상담',M:'모바일',Y:'연차'};
    return m[t] || t;
  },
  approvalLabel(s) { return s === 'Y' ? '승인' : '미승인'; },
  payTypeLabel(t) {
    const m = {Y:'유상',N:'무상',I:'유지보수',C:'취소'};
    return m[t] || '-';
  },
  customerStatus(r) {
    if (r.remark && r.remark.includes('강성')) return 'strong';
    if (r.remark && r.remark.includes('긴급')) return 'urgent';
    return 'normal';
  },
  statusLabel(r) {
    const s = this.customerStatus(r);
    if (s === 'strong') return '강성';
    if (s === 'urgent') return '긴급';
    return '일반';
  }
}">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <h2>접수처리목록</h2>
    <button class="btn-receipt" onclick="openReceiptForm()">+ 접수등록</button>
  </div>

  <!-- 검색바 -->
  <div class="search-bar">
    <span class="search-label">접수일</span>
    <input type="text" x-model="sday" style="width:90px;" placeholder="2026-04-01">
    <span style="color:#666;">~</span>
    <input type="text" x-model="eday" style="width:90px;" placeholder="2026-04-15">

    <span class="search-label" style="margin-left:6px;">접수구분</span>
    <select x-model="rctgbn" style="width:80px;">
      <option value="">전체</option>
      <option value="T">전화</option>
      <option value="P">우편</option>
      <option value="F">팩스</option>
      <option value="L">LED</option>
      <option value="S">상담</option>
      <option value="M">모바일</option>
    </select>

    <span class="search-label" style="margin-left:6px;">자재신청상태</span>
    <select x-model="jajeStatus" style="width:80px;">
      <option value="">전체</option>
      <option value="Y">신청완료</option>
      <option value="P">신청중</option>
      <option value="N">신청대기</option>
    </select>

    <span class="search-label" style="margin-left:6px;">검색필드</span>
    <select x-model="keyfield" style="width:110px;">
      <option value="">-- 선택 --</option>
      <option value="1">접수번호</option>
      <option value="2">접수사원</option>
      <option value="3">고객명</option>
      <option value="4">발신번호</option>
      <option value="5">연락처(휴대폰)</option>
      <option value="6">주소</option>
    </select>
    <input type="text" x-model="keyword" style="width:160px;" placeholder="키워드 입력" @keydown.enter="doSearch()">

    <button class="btn-primary" @click="doSearch()">검색</button>
    <button class="btn-excel" onclick="alert('엑셀 다운로드 (프로토타입)')">엑셀다운</button>
  </div>

  <!-- 결과 건수 -->
  <div class="result-bar">
    총 <span x-text="totalCount" style="color:#6699FF;"></span>건
  </div>

  <!-- 테이블 -->
  <div class="tbl-wrap" style="padding: 0 0 0 0;">
    <table class="svc-tbl">
      <thead>
        <tr>
          <th style="width:95px;">접수번호</th>
          <th style="width:95px;">처리번호</th>
          <th style="width:80px;">접수일</th>
          <th style="width:80px;">방문예약일</th>
          <th style="width:60px;">승인상태</th>
          <th style="width:55px;">접수구분</th>
          <th style="width:80px;">접수사원</th>
          <th style="width:110px;">고객명(상태)</th>
          <th style="width:100px;">발신번호</th>
          <th style="width:100px;">연락처</th>
          <th style="width:105px;">휴대폰</th>
          <th style="width:220px;">주소</th>
          <th style="width:100px;">아파트명</th>
          <th style="width:110px;">모델</th>
          <th style="width:60px;">판매유형</th>
          <th style="width:80px;">증상분류</th>
          <th style="width:80px;">세부증상</th>
          <th style="width:55px;">유상통보</th>
          <th style="width:130px;">특이사항</th>
          <th style="width:75px;">담당지점</th>
          <th style="width:110px;">담당기사</th>
          <th style="width:55px;">구간</th>
          <th style="width:75px;">자재신청</th>
        </tr>
      </thead>
      <tbody>
        <template x-if="pagedRows.length === 0">
          <tr>
            <td colspan="23" style="text-align:center;padding:20px;color:#999;">검색 결과가 없습니다.</td>
          </tr>
        </template>
        <template x-for="(row, idx) in pagedRows" :key="row.receiptNo">
          <tr :class="idx % 2 === 1 ? 'even-row' : ''">
            <!-- 접수번호 -->
            <td>
              <span class="receipt-no-link"
                    :class="{
                      'badge-strong': customerStatus(row) === 'strong',
                      'badge-urgent': customerStatus(row) === 'urgent'
                    }"
                    @click="openSvcPopup(row.receiptNo)"
                    x-text="row.receiptNo">
              </span>
            </td>
            <!-- 처리번호 -->
            <td>
              <span x-show="row.processNo"
                    class="process-no-link"
                    @click="openSvcPopup(row.receiptNo)"
                    x-text="row.processNo">
              </span>
              <span x-show="!row.processNo" style="color:#bbb;">-</span>
            </td>
            <!-- 접수일 -->
            <td x-text="row.receiptDate ? row.receiptDate.substring(0,10) : '-'"></td>
            <!-- 방문예약일 -->
            <td x-text="row.processDate || '-'"></td>
            <!-- 승인상태 -->
            <td>
              <span :class="row.approvalStatus === 'Y' ? 'approve-y' : 'approve-n'"
                    x-text="approvalLabel(row.approvalStatus)">
              </span>
            </td>
            <!-- 접수구분 -->
            <td x-text="receiptTypeLabel(row.receiptType)"></td>
            <!-- 접수사원 (담당기사에서 추출) -->
            <td x-text="row.engineer ? row.engineer.split('(')[0] : '-'"></td>
            <!-- 고객명(상태) -->
            <td>
              <span :class="{
                'badge-strong': customerStatus(row) === 'strong',
                'badge-urgent': customerStatus(row) === 'urgent',
                'badge-normal': customerStatus(row) === 'normal'
              }">
                <span x-text="row.customerName"></span>
                <span style="font-size:11px;" x-text="'('+statusLabel(row)+')'"></span>
              </span>
            </td>
            <!-- 발신번호 -->
            <td x-text="row.callerNo || '-'"></td>
            <!-- 연락처 -->
            <td x-text="row.contact || '-'"></td>
            <!-- 휴대폰 -->
            <td x-text="row.mobile || '-'"></td>
            <!-- 주소 -->
            <td class="left" x-text="row.address || '-'"></td>
            <!-- 아파트명 -->
            <td x-text="row.aptName || '-'"></td>
            <!-- 모델 -->
            <td x-text="row.model || '-'"></td>
            <!-- 판매유형 -->
            <td>
              <span :class="{
                'sell-hn': row.sellType === 'HN',
                'sell-special': row.sellType === '특판',
                'sell-market': row.sellType === '시판'
              }" x-text="row.sellType"></span>
            </td>
            <!-- 증상분류 -->
            <td x-text="row.errorMain || '-'"></td>
            <!-- 세부증상 -->
            <td x-text="row.errorSub || '-'"></td>
            <!-- 유상통보 -->
            <td>
              <span x-show="row.payType === 'Y'" style="color:#5500ff;font-weight:bold;">유상</span>
              <span x-show="row.payType !== 'Y'" x-text="row.payType ? payTypeLabel(row.payType) : '무상'"></span>
            </td>
            <!-- 특이사항 -->
            <td class="left" x-text="row.remark || ''"></td>
            <!-- 담당지점 -->
            <td x-text="row.branch || '-'"></td>
            <!-- 담당기사 -->
            <td x-text="row.engineer || '-'"></td>
            <!-- 구간 -->
            <td x-text="row.section || '-'"></td>
            <!-- 자재신청 -->
            <td>
              <span x-show="row.processNo" class="jaje-done">신청완료</span>
              <span x-show="!row.processNo" class="jaje-wait">신청대기</span>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>

  <!-- 페이지네이션 -->
  <div class="pagination">
    <button class="page-btn" @click="goPage(1)">&laquo;</button>
    <button class="page-btn" @click="goPage(currentPage - 1)">&lsaquo;</button>
    <template x-for="p in totalPages" :key="p">
      <button class="page-btn" :class="{ active: currentPage === p }" @click="goPage(p)" x-text="p"></button>
    </template>
    <button class="page-btn" @click="goPage(currentPage + 1)">&rsaquo;</button>
    <button class="page-btn" @click="goPage(totalPages)">&raquo;</button>
    <span style="margin-left:8px;font-size:12px;color:#666;">
      <span x-text="currentPage"></span> / <span x-text="totalPages"></span> 페이지
    </span>
  </div>

</div>

<script>
  function openSvcPopup(receiptNo) {
    window.open(
      'svc-popup.html?rno=' + (receiptNo || ''),
      'svcPopup',
      'width=720,height=700,scrollbars=yes,resizable=yes'
    );
  }
  function openReceiptForm() {
    window.open(
      'receipt-form.html',
      'receipt',
      'width=720,height=780,scrollbars=yes'
    );
  }
</script>
</body>
</html>
