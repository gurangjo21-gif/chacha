<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>KOCOM CS - 게시판</title>
  <script src="../../_shared/libs/tailwind.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        'k-primary': '#6699FF', 'k-active': '#5acd3e',
        'k-border': '#d7d7d7', 'k-text': '#333333',
        'k-sub': '#545454', 'k-bg': '#f2f2f2', 'k-header': '#f3f3f3',
      }}}
    }
  </script>
  <script defer src="../../_shared/libs/alpine.js"></script>
  <script src="../../../_shared/mock-data.js"></script>
  <style>
    body { font-size: 12px; font-family: 'Malgun Gothic', sans-serif; color: #333; }
    .tbl-wrap { overflow-x: auto; width: 100%; }
    table.forum-tbl { border-collapse: collapse; width: 100%; min-width: 700px; }
    table.forum-tbl thead th {
      background: #f3f3f3;
      border-top: 1px solid #cfcfcf;
      border-bottom: 1px solid #d7d7d7;
      border-left: 1px solid #e7e7e7;
      color: #545454;
      font-weight: bold;
      padding: 5px 4px;
      white-space: nowrap;
      text-align: center;
    }
    table.forum-tbl thead th:first-child { border-left: 0; }
    table.forum-tbl tbody td {
      border-bottom: 1px solid #d7d7d7;
      border-left: 1px solid #e7e7e7;
      color: #545454;
      font-weight: bold;
      padding: 5px 6px;
      text-align: center;
      white-space: nowrap;
    }
    table.forum-tbl tbody td:first-child { border-left: 0; }
    table.forum-tbl tbody tr:nth-child(even) { background-color: #FBF9C4; }
    table.forum-tbl tbody tr:hover { background-color: #FFF59D !important; }
    table.forum-tbl tbody td.left { text-align: left; padding-left: 6px; }
    /* 공지사항 고정 행 배경 */
    table.forum-tbl tbody tr.row-notice { background-color: #fff3cd !important; }
    table.forum-tbl tbody tr.row-notice:hover { background-color: #ffe999 !important; }

    .title-link { color: #333; cursor: pointer; text-decoration: none; }
    .title-link:hover { color: #6699FF; text-decoration: underline; }
    .notice-badge {
      display: inline-block;
      background: #e67e00;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      padding: 1px 5px;
      border-radius: 2px;
      margin-right: 4px;
      vertical-align: middle;
    }
    .file-icon {
      display: inline-block;
      background: #5acd3e;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      padding: 1px 5px;
      border-radius: 2px;
    }

    /* 탭 */
    .tab-bar {
      background: #f3f3f3;
      border-bottom: 2px solid #6699FF;
      display: flex;
      align-items: flex-end;
      padding: 0 16px;
      gap: 2px;
    }
    .tab-btn {
      padding: 7px 18px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 3px 3px 0 0;
      color: #666;
      background: #e9e9e9;
      margin-bottom: -2px;
    }
    .tab-btn.active {
      background: #fff;
      color: #6699FF;
      border-color: #6699FF;
      border-bottom-color: #fff;
    }
    .tab-btn:hover:not(.active) { background: #dde5ff; color: #3366cc; }

    .search-label { font-size: 12px; font-weight: bold; color: #333; white-space: nowrap; }
    select, input[type=text] {
      border: 1px solid #ccc;
      padding: 2px 4px;
      font-size: 12px;
      height: 24px;
      border-radius: 2px;
    }
    .btn-primary {
      background: #6699FF; color: #fff; border: none;
      padding: 4px 12px; border-radius: 2px; cursor: pointer; font-size: 12px; font-weight: bold;
    }
    .btn-primary:hover { background: #4477dd; }
    .btn-write {
      background: #6699FF; color: #fff; border: none;
      padding: 5px 14px; border-radius: 3px; cursor: pointer; font-size: 12px; font-weight: bold;
    }
    .btn-write:hover { background: #4477dd; }
    .page-header {
      background: #f3f3f3;
      border-bottom: 1px solid #d7d7d7;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 { font-size: 16px; font-weight: bold; color: #333; }
    .search-bar {
      background: #fafafa;
      border-bottom: 1px solid #d7d7d7;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }
    .result-bar {
      padding: 6px 16px;
      font-size: 12px;
      color: #333;
      font-weight: bold;
      border-bottom: 1px solid #e7e7e7;
      background: #fff;
    }
    .pagination { display: flex; gap: 2px; align-items: center; justify-content: center; padding: 10px 0; }
    .page-btn {
      border: 1px solid #d7d7d7;
      background: #fff;
      color: #333;
      padding: 3px 8px;
      cursor: pointer;
      font-size: 12px;
      border-radius: 2px;
    }
    .page-btn.active { background: #6699FF; color: #fff; border-color: #6699FF; font-weight: bold; }
    .page-btn:hover:not(.active) { background: #f2f2f2; }

    /* 카테고리 배지 */
    .cat-notice { color: #e67e00; font-weight: bold; }
    .cat-data   { color: #006699; font-weight: bold; }
    .cat-free   { color: #555; }
    .cat-qa     { color: #009900; font-weight: bold; }
  </style>
</head>
<body class="bg-white">

<div x-data="{
  allRows: window.MOCK ? MOCK.forumList : [],
  rows: [],
  activeTab: '공지사항',
  keyword: '',
  currentPage: 1,
  pageSize: 15,

  /* 탭 → category 매핑 */
  tabs: ['공지사항','자유게시판','Q&A','자료실'],
  tabCatMap: {
    '공지사항': '공지',
    '자유게시판': '일반',
    'Q&A': 'QA',
    '자료실': '자료',
  },

  init() { this.doSearch(); },

  switchTab(tab) {
    this.activeTab = tab;
    this.keyword = '';
    this.doSearch();
  },

  doSearch() {
    const cat = this.tabCatMap[this.activeTab];
    this.rows = this.allRows.filter(r => {
      /* 탭 필터: 공지사항 탭은 isNotice=true 전체 포함, 나머지는 category 매칭 */
      if (this.activeTab === '공지사항') {
        if (r.category !== '공지') return false;
      } else if (this.activeTab === '자유게시판') {
        if (r.category !== '일반') return false;
      } else if (this.activeTab === 'Q&A') {
        if (r.category !== 'QA') return false;
      } else if (this.activeTab === '자료실') {
        if (r.category !== '자료') return false;
      }
      /* 키워드 */
      if (this.keyword) {
        const kw = this.keyword.toLowerCase();
        const match =
          String(r.title).toLowerCase().includes(kw) ||
          String(r.author).toLowerCase().includes(kw);
        if (!match) return false;
      }
      return true;
    });
    this.currentPage = 1;
  },

  get noticeRows() {
    /* 공지사항 탭에서 isNotice=true인 항목을 상단 고정 */
    if (this.activeTab !== '공지사항') return [];
    return this.rows.filter(r => r.isNotice);
  },
  get normalRows() {
    if (this.activeTab === '공지사항') {
      return this.pagedAllRows.filter(r => !r.isNotice);
    }
    return this.pagedAllRows;
  },
  get pagedAllRows() {
    const s = (this.currentPage - 1) * this.pageSize;
    return this.rows.slice(s, s + this.pageSize);
  },
  get totalCount() { return this.rows.length; },
  get totalPages() { return Math.max(1, Math.ceil(this.rows.length / this.pageSize)); },
  goPage(p) { if (p >= 1 && p <= this.totalPages) this.currentPage = p; },

  hasFile(row) {
    /* mock-data에 파일 필드가 없으므로 id가 짝수인 경우 첨부 있음으로 시뮬레이션 */
    return row.id % 3 === 0;
  },

  rowNo(idx) {
    return this.totalCount - ((this.currentPage - 1) * this.pageSize + idx);
  }
}">

  <!-- 페이지 헤더 -->
  <div class="page-header">
    <h2>게시판</h2>
  </div>

  <!-- 탭 -->
  <div class="tab-bar">
    <template x-for="tab in tabs" :key="tab">
      <button class="tab-btn" :class="{ active: activeTab === tab }"
              @click="switchTab(tab)" x-text="tab">
      </button>
    </template>
  </div>

  <!-- 검색바 + 글쓰기 -->
  <div class="search-bar">
    <div style="display:flex;align-items:center;gap:6px;">
      <span class="search-label">검색</span>
      <input type="text" x-model="keyword" style="width:220px;"
             :placeholder="activeTab + ' 제목/작성자 검색'"
             @keydown.enter="doSearch()">
      <button class="btn-primary" @click="doSearch()">검색</button>
    </div>
    <button class="btn-write" onclick="alert('글쓰기 (프로토타입)')">+ 글쓰기</button>
  </div>

  <!-- 결과 건수 -->
  <div class="result-bar">
    <span x-text="activeTab" style="color:#6699FF;"></span> —
    총 <span x-text="totalCount" style="color:#6699FF;"></span>건
  </div>

  <!-- 테이블 -->
  <div class="tbl-wrap">
    <table class="forum-tbl">
      <thead>
        <tr>
          <th style="width:60px;">번호</th>
          <th>제목</th>
          <th style="width:100px;">작성자</th>
          <th style="width:100px;">작성일</th>
          <th style="width:70px;">조회수</th>
          <th style="width:70px;">파일첨부</th>
        </tr>
      </thead>
      <tbody>
        <!-- 데이터 없음 -->
        <template x-if="rows.length === 0">
          <tr>
            <td colspan="6" style="text-align:center;padding:30px;color:#999;">게시글이 없습니다.</td>
          </tr>
        </template>

        <!-- 공지사항 탭: isNotice=true 행 상단 고정 (배경 #fff3cd) -->
        <template x-if="activeTab === '공지사항'">
          <template x-for="row in noticeRows" :key="'notice-'+row.id">
            <tr class="row-notice">
              <td style="color:#e67e00; font-weight:bold;">공지</td>
              <td class="left">
                <span class="notice-badge">공지</span>
                <a class="title-link" @click.prevent="alert('게시글 상세: ' + row.title)" href="#"
                   x-text="row.title"></a>
              </td>
              <td x-text="row.author"></td>
              <td x-text="row.date"></td>
              <td x-text="row.views.toLocaleString()"></td>
              <td>
                <span x-show="hasFile(row)" class="file-icon">첨부</span>
                <span x-show="!hasFile(row)" style="color:#ccc;">-</span>
              </td>
            </tr>
          </template>
        </template>

        <!-- 일반 행 -->
        <template x-for="(row, idx) in (activeTab === '공지사항' ? normalRows : pagedAllRows)" :key="row.id">
          <tr>
            <td x-text="rowNo(idx + (activeTab === '공지사항' ? noticeRows.length : 0))"></td>
            <td class="left">
              <a class="title-link" @click.prevent="alert('게시글 상세: ' + row.title)" href="#"
                 x-text="row.title"></a>
            </td>
            <td x-text="row.author"></td>
            <td x-text="row.date"></td>
            <td x-text="row.views.toLocaleString()"></td>
            <td>
              <span x-show="hasFile(row)" class="file-icon">첨부</span>
              <span x-show="!hasFile(row)" style="color:#ccc;">-</span>
            </td>
          </tr>
        </template>

      </tbody>
    </table>
  </div>

  <!-- 페이지네이션 -->
  <div class="pagination">
    <button class="page-btn" @click="goPage(1)">&laquo;</button>
    <button class="page-btn" @click="goPage(currentPage - 1)">&lsaquo;</button>
    <template x-for="p in totalPages" :key="p">
      <button class="page-btn" :class="{ active: currentPage === p }"
              @click="goPage(p)" x-text="p"></button>
    </template>
    <button class="page-btn" @click="goPage(currentPage + 1)">&rsaquo;</button>
    <button class="page-btn" @click="goPage(totalPages)">&raquo;</button>
    <span style="margin-left:8px;font-size:12px;color:#666;">
      <span x-text="currentPage"></span> / <span x-text="totalPages"></span> 페이지
    </span>
  </div>

</div>
</body>
</html>
