<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>특이사항 등록/수정 - KOCOM CS</title>
  <script src="../../_shared/libs/tailwind.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      'k-primary':'#6699FF','k-active':'#5acd3e','k-border':'#d7d7d7',
      'k-text':'#333','k-sub':'#545454','k-bg':'#f2f2f2','k-header':'#f3f3f3'
    }}}}
  </script>
  <script src="../../specs/all-specs.js"></script>
  <script defer src="../../_shared/libs/alpine.js"></script>
</head>
<body class="bg-k-bg text-k-text text-sm">
<div class="p-4">

  <!-- 헤더 -->
  <div class="flex items-center justify-between mb-3 pb-2 border-b border-k-border">
    <h2 class="text-base font-bold text-k-sub">특이사항 수정</h2>
  </div>

  <!-- 폼 -->
  <div class="bg-white rounded border border-k-border">
    <table class="w-full text-xs border-collapse">
      <colgroup>
        <col style="width:150px">
        <col>
      </colgroup>
      <thead>
        <tr style="height:30px">
          <th class="bg-k-header px-3 py-2 border border-k-border text-left font-bold">
            모델명 <span class="text-red-500">*</span>
          </th>
          <td class="px-3 py-2 border border-k-border">
            <div class="flex items-center gap-2">
              <input type="text" value="IHP-700 / 인터폰 700시리즈" class="border border-k-border rounded px-2 py-1 text-xs flex-1" readonly>
              <button class="px-3 py-1 bg-gray-200 border border-k-border rounded text-xs hover:bg-gray-300">모델검색</button>
            </div>
          </td>
        </tr>
      </thead>
      <tbody>
        <tr style="height:30px">
          <th class="bg-k-header px-3 py-2 border border-k-border text-left font-bold">조회수</th>
          <td class="px-3 py-2 border border-k-border text-k-sub">128</td>
        </tr>
        <tr style="height:30px">
          <th class="bg-k-header px-3 py-2 border border-k-border text-left font-bold">
            장애분류 <span class="text-red-500">*</span>
          </th>
          <td class="px-3 py-2 border border-k-border">
            <div class="flex gap-3">
              <div class="flex items-center gap-1">
                <label class="text-xs text-gray-500">장애코드[대]</label>
                <select class="border border-k-border rounded px-2 py-1 text-xs">
                  <option>:: 장애코드[대] ::</option>
                  <option selected>인터폰</option>
                  <option>도어락</option>
                  <option>월패드</option>
                  <option>비디오폰</option>
                  <option>홈넷</option>
                </select>
              </div>
              <div class="flex items-center gap-1">
                <label class="text-xs text-gray-500">장애상세 <span class="text-red-500">*</span></label>
                <select class="border border-k-border rounded px-2 py-1 text-xs">
                  <option>:: 장애코드[소] ::</option>
                  <option selected>통화불량</option>
                  <option>영상불량</option>
                  <option>전원불량</option>
                </select>
              </div>
            </div>
          </td>
        </tr>
        <tr style="height:30px">
          <th class="bg-k-header px-3 py-2 border border-k-border text-left font-bold">수정자</th>
          <td class="px-3 py-2 border border-k-border text-k-sub">홍길동 ( u123456 )</td>
        </tr>
        <tr style="height:30px">
          <th class="bg-k-header px-3 py-2 border border-k-border text-left font-bold">수정일</th>
          <td class="px-3 py-2 border border-k-border text-k-sub">2026-04-15</td>
        </tr>
        <tr>
          <th class="bg-k-header px-3 py-2 border border-k-border text-left font-bold align-top pt-3">
            상담질문 <span class="text-red-500">*</span>
          </th>
          <td class="px-3 py-2 border border-k-border">
            <textarea class="border border-k-border rounded px-2 py-1 text-xs w-full" rows="4">인터폰에서 통화 시 상대방 목소리가 들리지 않거나 끊김이 발생합니다. 어떻게 조치해야 하나요?</textarea>
          </td>
        </tr>
        <tr>
          <th class="bg-k-header px-3 py-2 border border-k-border text-left font-bold align-top pt-3">
            처리결과 <span class="text-red-500">*</span>
          </th>
          <td class="px-3 py-2 border border-k-border">
            <textarea class="border border-k-border rounded px-2 py-1 text-xs w-full" rows="4">1. 인터폰 전원 재부팅 (10초 길게 눌러 리셋)
2. 개선 없을 경우 메인기판 교체 필요
3. 부품번호: IHP700-MB-001 참조
4. 교체 후 통화 테스트 필수</textarea>
          </td>
        </tr>
        <tr>
          <td colspan="2" class="px-3 py-3 border border-k-border text-right">
            <div class="flex justify-end gap-2">
              <button class="px-4 py-1 bg-k-active text-white rounded text-xs hover:opacity-90">수정</button>
              <button class="px-4 py-1 bg-gray-400 text-white rounded text-xs hover:opacity-90">취소</button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 개발자 스펙 패널 (프론트 개발 참고용) -->
<div x-data="{ open: false, spec: null }"
     x-init="Promise.resolve(window.ALL_SPECS && window.ALL_SPECS["receipt"]).then(d=>{ const k=location.pathname.split("/").pop().replace(".html",""); spec = d ? d[k] : null })"
     class="fixed right-0 top-0 h-screen z-50">
  <button @click="open = !open"
          class="fixed right-0 top-1/2 -translate-y-1/2 bg-[#6699FF] text-white px-2 py-4 rounded-l text-xs shadow-lg" style="writing-mode: vertical-rl;">
    스펙
  </button>
  <div x-show="open" @click.away="open = false" x-cloak
       class="fixed right-0 top-0 h-screen w-96 bg-white border-l-2 border-[#6699FF] shadow-2xl overflow-y-auto p-4 text-xs">
    <button @click="open = false" class="absolute top-2 right-2 text-gray-500 text-lg leading-none">&times;</button>
    <h3 class="font-bold text-sm text-[#6699FF] mb-1" x-text="spec?.title || '로딩중...'"></h3>
    <div class="text-[#999] mb-1" x-text="spec?.phpFile"></div>
    <div class="text-[#333] mb-2 text-[11px]" x-text="'업무: ' + (spec?.workflow || '')"></div>
    <div class="text-[#555] mb-3 text-[11px] leading-snug" x-text="spec?.purpose"></div>

    <div x-show="spec?.searchFields?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">검색/입력 필드</div>
      <table class="w-full text-[10px] border border-gray-200">
        <template x-for="f in spec?.searchFields">
          <tr class="border-b">
            <td class="px-2 py-1 font-mono text-[#6699FF] align-top" x-text="f.name"></td>
            <td class="px-2 py-1 align-top" x-text="f.label"></td>
            <td class="px-2 py-1 text-[#999] align-top" x-text="f.type"></td>
          </tr>
        </template>
      </table>
    </div>

    <div x-show="spec?.tableColumns?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">테이블 컬럼</div>
      <table class="w-full text-[10px] border border-gray-200">
        <template x-for="c in spec?.tableColumns">
          <tr class="border-b">
            <td class="px-2 py-1 align-top" x-text="c.name"></td>
            <td class="px-2 py-1 font-mono text-[#999] align-top" x-text="c.dbField"></td>
            <td class="px-2 py-1 text-[#999] align-top" x-text="c.format || ''"></td>
          </tr>
        </template>
      </table>
    </div>

    <div x-show="spec?.buttons?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">버튼</div>
      <template x-for="b in spec?.buttons">
        <div class="text-[10px] border-l-2 border-[#6699FF] pl-2 mb-1">
          <span class="font-bold" x-text="b.label"></span>: <span class="text-[#999]" x-text="b.action"></span>
        </div>
      </template>
    </div>

    <div x-show="spec?.popupsCalled?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">호출하는 팝업</div>
      <template x-for="p in spec?.popupsCalled">
        <div class="text-[10px] mb-1">
          <span x-text="p.trigger"></span> &rarr; <span class="font-mono text-[#6699FF]" x-text="p.popup"></span>
          <span class="text-[#999]" x-text="p.size ? '('+p.size+')' : ''"></span>
        </div>
      </template>
    </div>

    <div x-show="spec?.ajaxCalls?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">AJAX 호출</div>
      <template x-for="a in spec?.ajaxCalls">
        <div class="text-[10px] mb-1">
          <span x-text="a.trigger"></span> &rarr; <span class="font-mono text-[#6699FF]" x-text="a.url"></span>
          <span class="text-[#999]" x-text="' ['+a.mode+']'"></span>
        </div>
      </template>
    </div>

    <div x-show="spec?.iframes?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">iframe 구성</div>
      <template x-for="i in spec?.iframes">
        <div class="text-[10px] mb-1">
          <span class="font-mono text-[#6699FF]" x-text="i.name"></span>:
          <span class="text-[#666]" x-text="i.src"></span>
        </div>
      </template>
    </div>

    <div x-show="spec?.flowFrom?.length" class="mb-2">
      <div class="font-bold text-[#333] mb-1">유입 화면</div>
      <template x-for="t in spec?.flowFrom">
        <span class="inline-block bg-gray-100 text-[#666] px-2 py-0.5 rounded mr-1 mb-1 text-[10px]" x-text="t"></span>
      </template>
    </div>

    <div x-show="spec?.flowTo?.length" class="mb-2">
      <div class="font-bold text-[#333] mb-1">이동 가능한 화면</div>
      <template x-for="t in spec?.flowTo">
        <span class="inline-block bg-blue-50 text-[#6699FF] px-2 py-0.5 rounded mr-1 mb-1 text-[10px]" x-text="t"></span>
      </template>
    </div>
  </div>
</div>

</body>
</html>
