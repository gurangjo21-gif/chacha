<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>뇌전 등록 - KOCOM CS</title>
  <script src="../../_shared/libs/tailwind.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      'k-primary':'#6699FF','k-active':'#5acd3e','k-border':'#d7d7d7',
      'k-text':'#333','k-sub':'#545454','k-bg':'#f2f2f2','k-header':'#f3f3f3'
    }}}}
  </script>
  <script src="../../specs/all-specs.js"></script>
  <script defer src="../../_shared/libs/alpine.js"></script>
</head>
<body class="bg-k-bg text-k-text text-sm">
  <div class="p-4 max-w-3xl mx-auto">
    <div class="mb-4">
      <h2 class="text-lg font-bold">뇌전 등록</h2>
    </div>

    <div class="bg-white border border-k-border rounded overflow-hidden mb-4">
      <table class="w-full text-xs border-collapse">
        <colgroup>
          <col style="width:15%"><col style="width:35%"><col style="width:15%"><col style="width:35%">
        </colgroup>
        <thead>
          <tr class="border-b border-k-border bg-k-header">
            <th class="px-3 py-2 text-left text-k-sub font-bold border-r border-k-border">현장명 *</th>
            <th class="px-3 py-2" colspan="3">
              <div class="flex items-center gap-2">
                <input type="text" name="seace_name" placeholder="현장을 검색하세요" class="border border-k-border rounded px-2 py-1 w-1/2 text-xs" readonly>
                <button class="px-2 py-1 bg-gray-400 text-white rounded text-xs">검색</button>
                <input type="hidden" name="apt_no">
              </div>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-b border-k-border">
            <td class="bg-k-header px-3 py-2 font-semibold text-center border-r border-k-border">우편번호</td>
            <td class="px-3 py-2"><input type="text" name="zip" class="border border-k-border rounded px-2 py-1 w-20 text-xs bg-gray-100" readonly></td>
            <td class="bg-k-header px-3 py-2 font-semibold text-center border-r border-k-border">뇌전일 *</td>
            <td class="px-3 py-2"><input type="text" name="tdb_date" placeholder="YYYY-MM-DD" class="border border-k-border rounded px-2 py-1 w-32 text-xs"></td>
          </tr>
          <tr class="border-b border-k-border">
            <td class="bg-k-header px-3 py-2 font-semibold text-center border-r border-k-border">주소</td>
            <td class="px-3 py-2" colspan="3"><input type="text" name="addr1" class="border border-k-border rounded px-2 py-1 w-full text-xs bg-gray-100" readonly></td>
          </tr>
          <tr class="border-b border-k-border">
            <td class="bg-k-header px-3 py-2 font-semibold text-center border-r border-k-border">상세주소</td>
            <td class="px-3 py-2" colspan="3"><input type="text" name="addr2" class="border border-k-border rounded px-2 py-1 w-full text-xs bg-gray-100" readonly></td>
          </tr>
          <tr class="border-b border-k-border">
            <td class="bg-k-header px-3 py-2 font-semibold text-center border-r border-k-border">모델명 *</td>
            <td class="px-3 py-2" colspan="3">
              <div class="flex items-center gap-2">
                <input type="text" name="model_name" placeholder="모델명을 선택하세요" class="border border-k-border rounded px-2 py-1 w-1/2 text-xs" readonly>
                <button class="px-2 py-1 bg-gray-400 text-white rounded text-xs">모델검색</button>
              </div>
            </td>
          </tr>
          <tr class="border-b border-k-border">
            <td class="bg-k-header px-3 py-2 font-semibold text-center border-r border-k-border">수량 *</td>
            <td class="px-3 py-2"><input type="text" name="tdb_num" class="border border-k-border rounded px-2 py-1 w-20 text-xs" placeholder="수량 입력"></td>
            <td class="bg-k-header px-3 py-2 font-semibold text-center border-r border-k-border">접수센터</td>
            <td class="px-3 py-2">
              <select name="in_center" class="border border-k-border rounded px-2 py-1 text-xs w-full">
                <option>서울센터</option>
                <option>부산센터</option>
                <option>대구센터</option>
              </select>
            </td>
          </tr>
          <tr>
            <td colspan="4" class="px-3 py-3">
              <div class="flex gap-2">
                <button class="px-3 py-1 bg-gray-400 text-white rounded text-xs">취소(목록)</button>
                <button class="px-3 py-1 bg-green-500 text-white rounded text-xs">뇌전 접수</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
<!-- 개발자 스펙 패널 -->
<div x-data="{ open: false, spec: null }"
     x-init="(() => { const cat = location.pathname.includes('/store/')?'store':'tdb'; Promise.resolve(window.ALL_SPECS && window.ALL_SPECS["tdb"]).then(d=>{ const k=location.pathname.split("/").pop().replace(".html",""); spec = d ? d[k] : null }) })()"
     class="fixed right-0 top-0 h-screen z-50">
  <button @click="open = !open"
          class="fixed right-0 top-1/2 -translate-y-1/2 bg-[#6699FF] text-white px-2 py-4 rounded-l text-xs shadow-lg">
    📋 스펙
  </button>
  <div x-show="open" @click.away="open = false"
       class="fixed right-0 top-0 h-screen w-96 bg-white border-l-2 border-[#6699FF] shadow-2xl overflow-y-auto p-4 text-xs">
    <button @click="open = false" class="absolute top-2 right-2 text-gray-500">✕</button>
    <h3 class="font-bold text-sm text-[#6699FF] mb-2" x-text="spec?.title || '로딩중...'"></h3>
    <div class="text-[#999] mb-3" x-text="spec?.phpFile"></div>
    <div class="bg-blue-50 p-2 mb-3 rounded" x-text="spec?.workflow"></div>

    <div x-show="spec?.searchFields?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">🔍 검색 필드</div>
      <template x-for="f in spec?.searchFields">
        <div class="flex gap-2 text-[10px] border-b py-1">
          <span class="font-mono text-[#6699FF] w-20" x-text="f.name"></span>
          <span x-text="f.label"></span>
          <span class="text-[#999] ml-auto" x-text="f.type"></span>
        </div>
      </template>
    </div>

    <div x-show="spec?.tableColumns?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">📊 테이블 컬럼 (<span x-text="spec?.tableColumns?.length"></span>개)</div>
      <template x-for="c in spec?.tableColumns">
        <div class="text-[10px] border-b py-1" x-text="c.name + ' (' + (c.dbField||'') + ')'"></div>
      </template>
    </div>

    <div x-show="spec?.buttons?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">🔘 버튼</div>
      <template x-for="b in spec?.buttons">
        <div class="text-[10px] border-l-2 border-[#6699FF] pl-2 mb-1">
          <b x-text="b.label"></b>: <span class="text-[#999]" x-text="b.action"></span>
        </div>
      </template>
    </div>

    <div x-show="spec?.popupsCalled?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">🪟 호출 팝업</div>
      <template x-for="p in spec?.popupsCalled">
        <div class="text-[10px] mb-1" x-text="p.trigger + ' → ' + p.popup"></div>
      </template>
    </div>

    <div x-show="spec?.flowTo?.length" class="mb-3">
      <div class="font-bold text-[#333] mb-1">➡️ 연결 화면</div>
      <template x-for="t in spec?.flowTo">
        <span class="inline-block bg-blue-50 text-[#6699FF] px-2 py-0.5 rounded mr-1 text-[10px]" x-text="t"></span>
      </template>
    </div>
  </div>
</div>

</body>
</html>
