<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>고객 관리 - KOCOM CS</title>
  <script src="../../_shared/libs/tailwind.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      'k-primary':'#6699FF','k-active':'#5acd3e','k-border':'#d7d7d7',
      'k-text':'#333','k-sub':'#545454','k-bg':'#f2f2f2','k-header':'#f3f3f3'
    }}}}
  </script>
  <script src="../../specs/all-specs.js"></script>
  <script defer src="../../_shared/libs/alpine.js"></script>
</head>
<body class="bg-k-bg text-k-text text-sm" x-data="{
  keyword:'', keyfield:'1',
  rows:[
    {no:10, name:'김민준', tel:'02-1234-5678', cell:'010-1234-5678', addr:'서울시 강남구 테헤란로 123 102동 501호', apt:'래미안 강남', reg:'홍길동', date:'2026-04-10'},
    {no:9, name:'이수연', tel:'031-234-5678', cell:'010-2345-6789', addr:'경기도 성남시 분당구 판교로 456 A동 302호', apt:'판교 힐스테이트', reg:'이순신', date:'2026-04-08'},
    {no:8, name:'박철수', tel:'051-345-6789', cell:'010-3456-7890', addr:'부산시 해운대구 해운대로 789 B동 101호', apt:'해운대 아이파크', reg:'장보고', date:'2026-04-07'},
    {no:7, name:'정지은', tel:'02-456-7890', cell:'010-4567-8901', addr:'서울시 마포구 홍익로 101 1동 201호', apt:'마포 자이', reg:'강감찬', date:'2026-04-05'},
    {no:6, name:'최병훈', tel:'042-567-8901', cell:'010-5678-9012', addr:'대전시 유성구 대학로 99 C동 401호', apt:'도안 신도시 엘리움', reg:'이기자', date:'2026-04-03'},
    {no:5, name:'강나래', tel:'062-678-9012', cell:'010-6789-0123', addr:'광주시 서구 상무대로 400 D동 601호', apt:'상무 센트럴', reg:'이기자', date:'2026-04-01'},
    {no:4, name:'송민호', tel:'053-789-0123', cell:'010-7890-1234', addr:'대구시 수성구 수성로 50 E동 201호', apt:'수성 롯데캐슬', reg:'홍길동', date:'2026-03-28'},
    {no:3, name:'윤지혜', tel:'033-890-1234', cell:'010-8901-2345', addr:'강원도 춘천시 후평로 30 A동 301호', apt:'후평 한솔', reg:'이순신', date:'2026-03-25'},
  ]
}">
<div class="max-w-6xl mx-auto p-4">
  <div class="flex items-center justify-between mb-4 pb-2 border-b border-k-border">
    <h2 class="text-lg font-bold">고객 관리</h2>
    <div class="flex gap-1">
      <button class="bg-gray-500 text-white px-3 py-1 rounded text-xs hover:opacity-80">엑셀다운</button>
      <a href="admin_member_mode.html" class="bg-k-primary text-white px-3 py-1 rounded text-xs hover:opacity-80">고객추가</a>
    </div>
  </div>

  <div class="bg-white border border-k-border rounded p-3 mb-3 flex gap-2 items-center text-xs">
    <span class="font-bold">검색</span>
    <select x-model="keyfield" class="border border-k-border rounded px-2 py-1">
      <option value="1">고객명</option><option value="2">전화번호</option><option value="3">주소</option>
    </select>
    <input type="text" x-model="keyword" placeholder="검색어 입력" class="border border-k-border rounded px-2 py-1 w-48">
    <button class="bg-k-primary text-white px-3 py-1 rounded hover:opacity-80">검색</button>
  </div>

  <div class="bg-white border border-k-border rounded overflow-hidden">
    <table class="w-full text-xs">
      <thead class="bg-k-header">
        <tr>
          <th class="py-2 px-3 border-b border-r border-k-border text-center w-10">번호</th>
          <th class="py-2 px-3 border-b border-r border-k-border text-center">고객명</th>
          <th class="py-2 px-3 border-b border-r border-k-border text-center">전화번호</th>
          <th class="py-2 px-3 border-b border-r border-k-border text-center">휴대전화</th>
          <th class="py-2 px-3 border-b border-r border-k-border text-left">주소</th>
          <th class="py-2 px-3 border-b border-r border-k-border text-center">아파트명</th>
          <th class="py-2 px-3 border-b border-r border-k-border text-center">등록자</th>
          <th class="py-2 px-3 border-b border-r border-k-border text-center">등록일</th>
          <th class="py-2 px-3 border-b border-k-border text-center">비고</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="r in rows" :key="r.no">
          <tr class="border-b border-k-border hover:bg-blue-50">
            <td class="py-2 px-3 text-center border-r border-k-border" x-text="r.no"></td>
            <td class="py-2 px-3 text-center border-r border-k-border font-bold" x-text="r.name"></td>
            <td class="py-2 px-3 text-center border-r border-k-border" x-text="r.tel"></td>
            <td class="py-2 px-3 text-center border-r border-k-border" x-text="r.cell"></td>
            <td class="py-2 px-3 border-r border-k-border" x-text="r.addr"></td>
            <td class="py-2 px-3 text-center border-r border-k-border" x-text="r.apt"></td>
            <td class="py-2 px-3 text-center border-r border-k-border" x-text="r.reg"></td>
            <td class="py-2 px-3 text-center border-r border-k-border" x-text="r.date"></td>
            <td class="py-2 px-3 text-center">
              <a href="admin_member_mode.html" class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs hover:bg-blue-200">수정</a>
            </td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
  <div class="flex justify-center mt-4 gap-1 text-xs">
    <button class="px-3 py-1 border border-k-border rounded bg-white">이전</button>
    <button class="px-3 py-1 border border-k-primary rounded bg-k-primary text-white">1</button>
    <button class="px-3 py-1 border border-k-border rounded bg-white">2</button>
    <button class="px-3 py-1 border border-k-border rounded bg-white">다음</button>
  </div>
</div>
<!-- 개발자 스펙 패널 -->
<div x-data="{ open: false, spec: null }"
     x-init="(() => { const cat = location.pathname.includes('/admin/')?'admin': location.pathname.includes('/forum/')?'forum':'popup'; Promise.resolve(window.ALL_SPECS && window.ALL_SPECS["admin"]).then(d=>{ const k=location.pathname.split("/").pop().replace(".html",""); spec = d ? d[k] : null }).catch(()=>{}) })()"
     class="fixed right-0 top-0 h-screen z-50">
  <button @click="open = !open"
          class="fixed right-0 top-1/2 -translate-y-1/2 bg-[#6699FF] text-white px-2 py-4 rounded-l text-xs shadow-lg">
    스펙
  </button>
  <div x-show="open" @click.away="open = false" x-cloak
       class="fixed right-0 top-0 h-screen w-96 bg-white border-l-2 border-[#6699FF] shadow-2xl overflow-y-auto p-4 text-xs">
    <button @click="open = false" class="absolute top-2 right-2 text-gray-500">[x]</button>
    <h3 class="font-bold text-sm text-[#6699FF] mb-2" x-text="spec?.title || '로딩중...'"></h3>
    <div class="text-[#999] mb-3" x-text="spec?.phpFile"></div>
    <div class="bg-blue-50 p-2 mb-3 rounded" x-text="spec?.workflow"></div>
    <div class="mb-3" x-show="spec?.purpose">
      <div class="font-bold mb-1">목적</div>
      <div class="text-[11px] text-gray-700" x-text="spec?.purpose"></div>
    </div>
    <div x-show="spec?.searchFields?.length" class="mb-3">
      <div class="font-bold mb-1">검색 필드</div>
      <template x-for="f in spec?.searchFields" :key="f.name">
        <div class="flex gap-2 text-[10px] border-b py-1">
          <span class="font-mono text-[#6699FF] w-20" x-text="f.name"></span>
          <span x-text="f.label"></span>
          <span class="text-[#999] ml-auto" x-text="f.type"></span>
        </div>
      </template>
    </div>
    <div x-show="spec?.tableColumns?.length" class="mb-3">
      <div class="font-bold mb-1">컬럼 (<span x-text="spec?.tableColumns?.length"></span>개)</div>
      <template x-for="c in spec?.tableColumns" :key="c.name">
        <div class="text-[10px] border-b py-1" x-text="c.name + ' (' + (c.dbField||'') + ')'"></div>
      </template>
    </div>
    <div x-show="spec?.buttons?.length" class="mb-3">
      <div class="font-bold mb-1">버튼</div>
      <template x-for="b in spec?.buttons" :key="b.label">
        <div class="text-[10px] border-l-2 border-[#6699FF] pl-2 mb-1">
          <b x-text="b.label"></b>: <span class="text-[#999]" x-text="b.action"></span>
        </div>
      </template>
    </div>
    <div x-show="spec?.popupsCalled?.length" class="mb-3">
      <div class="font-bold mb-1">호출 팝업</div>
      <template x-for="p in spec?.popupsCalled" :key="p.popup">
        <div class="text-[10px] mb-1" x-text="p.trigger + ' -> ' + p.popup"></div>
      </template>
    </div>
    <div x-show="spec?.flowFrom?.length" class="mb-3">
      <div class="font-bold mb-1">진입 경로</div>
      <template x-for="t in spec?.flowFrom" :key="t">
        <span class="inline-block bg-gray-100 text-gray-700 px-2 py-0.5 rounded mr-1 text-[10px]" x-text="t"></span>
      </template>
    </div>
    <div x-show="spec?.flowTo?.length" class="mb-3">
      <div class="font-bold mb-1">연결 화면</div>
      <template x-for="t in spec?.flowTo" :key="t">
        <span class="inline-block bg-blue-50 text-[#6699FF] px-2 py-0.5 rounded mr-1 text-[10px]" x-text="t"></span>
      </template>
    </div>
  </div>
</div>
</body>
</html>
