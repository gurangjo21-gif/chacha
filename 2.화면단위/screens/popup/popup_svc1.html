<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>처리 v2 (연차) - KOCOM</title>
  <script src="../../_shared/libs/tailwind.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      'k-primary':'#6699FF','k-active':'#5acd3e','k-border':'#d7d7d7',
      'k-text':'#333','k-sub':'#545454','k-bg':'#f2f2f2','k-header':'#f3f3f3'
    }}}}
  </script>
  <script src="../../specs/all-specs.js"></script>
  <script defer src="../../_shared/libs/alpine.js"></script>
</head>
<body class="bg-white text-xs text-[#333]" x-data="{
  svcDate: '2026-04-15',
  techName: '박기사',
  repairCode1: '',
  causeCode1: '',
  freeCharge: 'N',
  pay1: '',
  svcMemo: '',
  svcResult: '1',
  rctYear: '2',
  gongJong: '홈네트워크',
  otherGJ: 'N',
  repairCodes: [
    { code:'R01', name:'전원교체' },
    { code:'R02', name:'기판교체' },
    { code:'R04', name:'설정변경' },
  ],
  causeCodes: [
    { code:'C01', name:'노후화' },
    { code:'C02', name:'충격' },
  ],
  save() {
    if(!this.svcDate) { alert('처리일자를 입력해주세요.'); return; }
    alert('연차 처리 저장되었습니다.'); window.close();
  }
}">
  <div class="overflow-auto" style="width:780px; max-height:90vh;">
    <div class="p-2">
      <div class="flex justify-between items-center mb-2">
        <strong>[처리 - 연차접수]</strong>
        <div class="flex gap-1">
          <button class="bg-[#6699FF] text-white px-2 py-0.5 text-xs rounded" @click="save()">저장</button>
          <button class="bg-[#6699FF] text-white px-2 py-0.5 text-xs rounded" @click="window.close()">닫기</button>
        </div>
      </div>
      <div class="border border-[#ddd] p-2 mb-2">
        <strong class="block mb-1 text-[10px]">[처리 기본정보 - 연차]</strong>
        <table class="w-full border-collapse text-xs" style="border-top:2px solid #959595;">
          <tr>
            <th class="border border-[#959595] bg-[#f3f3f3] px-2 py-1 font-bold w-[15%]">접수번호</th>
            <td class="border border-[#959595] px-2 py-1 w-[35%]"><input type="text" value="260401-0045" readonly class="bg-gray-100 text-xs px-1 w-full"></td>
            <th class="border border-[#959595] bg-[#f3f3f3] px-2 py-1 font-bold w-[15%]">연차</th>
            <td class="border border-[#959595] px-2 py-1 w-[35%]"><input type="text" x-model="rctYear" readonly class="bg-gray-100 text-xs px-1 w-12"></td>
          </tr>
          <tr>
            <th class="border border-[#959595] bg-[#f3f3f3] px-2 py-1 font-bold">처리일자</th>
            <td class="border border-[#959595] px-2 py-1"><input type="date" x-model="svcDate" class="border border-[#ccc] text-xs px-1"></td>
            <th class="border border-[#959595] bg-[#f3f3f3] px-2 py-1 font-bold">공종명</th>
            <td class="border border-[#959595] px-2 py-1"><input type="text" x-model="gongJong" class="border border-[#ccc] text-xs px-1 w-24"></td>
          </tr>
          <tr>
            <th class="border border-[#959595] bg-[#f3f3f3] px-2 py-1 font-bold">수리코드</th>
            <td class="border border-[#959595] px-2 py-1">
              <select x-model="repairCode1" class="border border-[#ccc] text-xs px-1">
                <option value="">:: 선택 ::</option>
                <template x-for="rc in repairCodes" :key="rc.code">
                  <option :value="rc.code" x-text="rc.name"></option>
                </template>
              </select>
            </td>
            <th class="border border-[#959595] bg-[#f3f3f3] px-2 py-1 font-bold">원인코드</th>
            <td class="border border-[#959595] px-2 py-1">
              <select x-model="causeCode1" class="border border-[#ccc] text-xs px-1">
                <option value="">:: 선택 ::</option>
                <template x-for="cc in causeCodes" :key="cc.code">
                  <option :value="cc.code" x-text="cc.name"></option>
                </template>
              </select>
            </td>
          </tr>
          <tr>
            <th class="border border-[#959595] bg-[#f3f3f3] px-2 py-1 font-bold">유/무상</th>
            <td class="border border-[#959595] px-2 py-1">
              <select x-model="freeCharge" class="border border-[#ccc] text-xs px-1">
                <option value="N">무상</option>
                <option value="Y">유상</option>
              </select>
            </td>
            <th class="border border-[#959595] bg-[#f3f3f3] px-2 py-1 font-bold">수납금액</th>
            <td class="border border-[#959595] px-2 py-1">
              <input type="text" x-model="pay1" class="border border-[#ccc] text-xs px-1 w-24 text-right"> 원
            </td>
          </tr>
          <tr>
            <th class="border border-[#959595] bg-[#f3f3f3] px-2 py-1 font-bold">처리내용</th>
            <td class="border border-[#959595] px-2 py-1" colspan="3">
              <textarea x-model="svcMemo" rows="4" class="border border-[#ccc] text-xs px-1 w-full resize-none" placeholder="처리 내용..."></textarea>
            </td>
          </tr>
        </table>
      </div>
    </div>
  </div>
<!-- 개발자 스펙 패널 -->
<div x-data="{ open: false, spec: null }"
     x-init="(() => { const cat = location.pathname.includes('/admin/')?'admin': location.pathname.includes('/forum/')?'forum':'popup'; Promise.resolve(window.ALL_SPECS && window.ALL_SPECS["popup"]).then(d=>{ const k=location.pathname.split("/").pop().replace(".html",""); spec = d ? d[k] : null }).catch(()=>{}) })()"
     class="fixed right-0 top-0 h-screen z-50">
  <button @click="open = !open"
          class="fixed right-0 top-1/2 -translate-y-1/2 bg-[#6699FF] text-white px-2 py-4 rounded-l text-xs shadow-lg">
    스펙
  </button>
  <div x-show="open" @click.away="open = false" x-cloak
       class="fixed right-0 top-0 h-screen w-96 bg-white border-l-2 border-[#6699FF] shadow-2xl overflow-y-auto p-4 text-xs">
    <button @click="open = false" class="absolute top-2 right-2 text-gray-500">[x]</button>
    <h3 class="font-bold text-sm text-[#6699FF] mb-2" x-text="spec?.title || '로딩중...'"></h3>
    <div class="text-[#999] mb-3" x-text="spec?.phpFile"></div>
    <div class="bg-blue-50 p-2 mb-3 rounded" x-text="spec?.workflow"></div>
    <div class="mb-3" x-show="spec?.purpose">
      <div class="font-bold mb-1">목적</div>
      <div class="text-[11px] text-gray-700" x-text="spec?.purpose"></div>
    </div>
    <div x-show="spec?.searchFields?.length" class="mb-3">
      <div class="font-bold mb-1">검색 필드</div>
      <template x-for="f in spec?.searchFields" :key="f.name">
        <div class="flex gap-2 text-[10px] border-b py-1">
          <span class="font-mono text-[#6699FF] w-20" x-text="f.name"></span>
          <span x-text="f.label"></span>
          <span class="text-[#999] ml-auto" x-text="f.type"></span>
        </div>
      </template>
    </div>
    <div x-show="spec?.tableColumns?.length" class="mb-3">
      <div class="font-bold mb-1">컬럼 (<span x-text="spec?.tableColumns?.length"></span>개)</div>
      <template x-for="c in spec?.tableColumns" :key="c.name">
        <div class="text-[10px] border-b py-1" x-text="c.name + ' (' + (c.dbField||'') + ')'"></div>
      </template>
    </div>
    <div x-show="spec?.buttons?.length" class="mb-3">
      <div class="font-bold mb-1">버튼</div>
      <template x-for="b in spec?.buttons" :key="b.label">
        <div class="text-[10px] border-l-2 border-[#6699FF] pl-2 mb-1">
          <b x-text="b.label"></b>: <span class="text-[#999]" x-text="b.action"></span>
        </div>
      </template>
    </div>
    <div x-show="spec?.popupsCalled?.length" class="mb-3">
      <div class="font-bold mb-1">호출 팝업</div>
      <template x-for="p in spec?.popupsCalled" :key="p.popup">
        <div class="text-[10px] mb-1" x-text="p.trigger + ' -> ' + p.popup"></div>
      </template>
    </div>
    <div x-show="spec?.flowFrom?.length" class="mb-3">
      <div class="font-bold mb-1">진입 경로</div>
      <template x-for="t in spec?.flowFrom" :key="t">
        <span class="inline-block bg-gray-100 text-gray-700 px-2 py-0.5 rounded mr-1 text-[10px]" x-text="t"></span>
      </template>
    </div>
    <div x-show="spec?.flowTo?.length" class="mb-3">
      <div class="font-bold mb-1">연결 화면</div>
      <template x-for="t in spec?.flowTo" :key="t">
        <span class="inline-block bg-blue-50 text-[#6699FF] px-2 py-0.5 rounded mr-1 text-[10px]" x-text="t"></span>
      </template>
    </div>
  </div>
</div>
</body>
</html>
