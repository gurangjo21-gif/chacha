<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>업무담당자조회 - KOCOM</title>
  <script src="../../_shared/libs/tailwind.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: {
      'k-primary':'#6699FF','k-active':'#5acd3e','k-border':'#d7d7d7',
      'k-text':'#333','k-sub':'#545454','k-bg':'#f2f2f2','k-header':'#f3f3f3'
    }}}}
  </script>
  <script src="../../specs/all-specs.js"></script>
  <script defer src="../../_shared/libs/alpine.js"></script>
</head>
<body class="bg-white text-xs text-[#333]" x-data="{
  keyfield: '',
  keyword: '',
  results: [
    { id:1, dept:'CS기획팀', name:'김기획', grade:'대리', task:'CS시스템기획', tel:'02-1234-5678', ext:'201', mobile:'010-1111-2222' },
    { id:2, dept:'영업팀', name:'이영업', grade:'과장', task:'신규거래처 발굴', tel:'02-2345-6789', ext:'305', mobile:'010-2222-3333' },
    { id:3, dept:'기술지원팀', name:'박기술', grade:'차장', task:'AS기술지원', tel:'02-3456-7890', ext:'410', mobile:'010-3333-4444' },
    { id:4, dept:'고객서비스팀', name:'최서비스', grade:'팀장', task:'고객불만처리', tel:'02-4567-8901', ext:'512', mobile:'010-4444-5555' },
    { id:5, dept:'물류팀', name:'정물류', grade:'주임', task:'자재입출고관리', tel:'02-5678-9012', ext:'615', mobile:'010-5555-6666' },
  ]
}">
  <div class="p-2" style="width:797px;">
    <div class="border border-[#ddd] p-2">
      <div class="flex items-center justify-between mb-2">
        <strong>[업무담당자조회]</strong>
        <div class="flex items-center gap-1">
          <select x-model="keyfield" class="border border-[#ccc] px-1 py-0.5 text-xs">
            <option value="">전체</option>
            <option value="1">업무부서</option>
            <option value="2">담당자명</option>
            <option value="3">담당업무</option>
            <option value="4">전화번호</option>
            <option value="5">내선번호</option>
            <option value="6">휴대폰</option>
          </select>
          <input type="text" x-model="keyword" class="border border-[#ccc] px-1 py-0.5 w-32 text-xs" placeholder="검색어">
          <button class="bg-[#6699FF] text-white px-2 py-0.5 text-xs rounded">검색</button>
        </div>
      </div>
      <table class="w-full border-collapse text-xs" style="border-top:2px solid #959595;">
        <thead>
          <tr class="bg-[#f3f3f3]">
            <th class="border border-[#959595] px-2 py-1 w-24">업무부서</th>
            <th class="border border-[#959595] px-2 py-1 w-16">담당자</th>
            <th class="border border-[#959595] px-2 py-1 w-14">직급</th>
            <th class="border border-[#959595] px-2 py-1">담당업무</th>
            <th class="border border-[#959595] px-2 py-1 w-28">전화번호(내선)</th>
            <th class="border border-[#959595] px-2 py-1 w-24">핸드폰</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="row in results" :key="row.id">
            <tr class="hover:bg-blue-50 cursor-pointer" @click="alert('선택: ' + row.name + ' (' + row.dept + ')')">
              <td class="border border-[#959595] px-2 py-1" x-text="row.dept"></td>
              <td class="border border-[#959595] px-2 py-1" x-text="row.name"></td>
              <td class="border border-[#959595] px-2 py-1 text-center" x-text="row.grade"></td>
              <td class="border border-[#959595] px-2 py-1" x-text="row.task"></td>
              <td class="border border-[#959595] px-2 py-1 text-center" x-text="row.tel + ' (' + row.ext + ')'"></td>
              <td class="border border-[#959595] px-2 py-1 text-center" x-text="row.mobile"></td>
            </tr>
          </template>
        </tbody>
      </table>
      <div class="flex justify-center mt-1 gap-1">
        <button class="border px-2 py-0.5 text-xs">이전</button>
        <button class="border px-2 py-0.5 text-xs bg-[#6699FF] text-white">1</button>
        <button class="border px-2 py-0.5 text-xs">다음</button>
      </div>
    </div>
  </div>
<!-- 개발자 스펙 패널 -->
<div x-data="{ open: false, spec: null }"
     x-init="(() => { const cat = location.pathname.includes('/admin/')?'admin': location.pathname.includes('/forum/')?'forum':'popup'; Promise.resolve(window.ALL_SPECS && window.ALL_SPECS["popup"]).then(d=>{ const k=location.pathname.split("/").pop().replace(".html",""); spec = d ? d[k] : null }).catch(()=>{}) })()"
     class="fixed right-0 top-0 h-screen z-50">
  <button @click="open = !open"
          class="fixed right-0 top-1/2 -translate-y-1/2 bg-[#6699FF] text-white px-2 py-4 rounded-l text-xs shadow-lg">
    스펙
  </button>
  <div x-show="open" @click.away="open = false" x-cloak
       class="fixed right-0 top-0 h-screen w-96 bg-white border-l-2 border-[#6699FF] shadow-2xl overflow-y-auto p-4 text-xs">
    <button @click="open = false" class="absolute top-2 right-2 text-gray-500">[x]</button>
    <h3 class="font-bold text-sm text-[#6699FF] mb-2" x-text="spec?.title || '로딩중...'"></h3>
    <div class="text-[#999] mb-3" x-text="spec?.phpFile"></div>
    <div class="bg-blue-50 p-2 mb-3 rounded" x-text="spec?.workflow"></div>
    <div class="mb-3" x-show="spec?.purpose">
      <div class="font-bold mb-1">목적</div>
      <div class="text-[11px] text-gray-700" x-text="spec?.purpose"></div>
    </div>
    <div x-show="spec?.searchFields?.length" class="mb-3">
      <div class="font-bold mb-1">검색 필드</div>
      <template x-for="f in spec?.searchFields" :key="f.name">
        <div class="flex gap-2 text-[10px] border-b py-1">
          <span class="font-mono text-[#6699FF] w-20" x-text="f.name"></span>
          <span x-text="f.label"></span>
          <span class="text-[#999] ml-auto" x-text="f.type"></span>
        </div>
      </template>
    </div>
    <div x-show="spec?.tableColumns?.length" class="mb-3">
      <div class="font-bold mb-1">컬럼 (<span x-text="spec?.tableColumns?.length"></span>개)</div>
      <template x-for="c in spec?.tableColumns" :key="c.name">
        <div class="text-[10px] border-b py-1" x-text="c.name + ' (' + (c.dbField||'') + ')'"></div>
      </template>
    </div>
    <div x-show="spec?.buttons?.length" class="mb-3">
      <div class="font-bold mb-1">버튼</div>
      <template x-for="b in spec?.buttons" :key="b.label">
        <div class="text-[10px] border-l-2 border-[#6699FF] pl-2 mb-1">
          <b x-text="b.label"></b>: <span class="text-[#999]" x-text="b.action"></span>
        </div>
      </template>
    </div>
    <div x-show="spec?.popupsCalled?.length" class="mb-3">
      <div class="font-bold mb-1">호출 팝업</div>
      <template x-for="p in spec?.popupsCalled" :key="p.popup">
        <div class="text-[10px] mb-1" x-text="p.trigger + ' -> ' + p.popup"></div>
      </template>
    </div>
    <div x-show="spec?.flowFrom?.length" class="mb-3">
      <div class="font-bold mb-1">진입 경로</div>
      <template x-for="t in spec?.flowFrom" :key="t">
        <span class="inline-block bg-gray-100 text-gray-700 px-2 py-0.5 rounded mr-1 text-[10px]" x-text="t"></span>
      </template>
    </div>
    <div x-show="spec?.flowTo?.length" class="mb-3">
      <div class="font-bold mb-1">연결 화면</div>
      <template x-for="t in spec?.flowTo" :key="t">
        <span class="inline-block bg-blue-50 text-[#6699FF] px-2 py-0.5 rounded mr-1 text-[10px]" x-text="t"></span>
      </template>
    </div>
  </div>
</div>
</body>
</html>
