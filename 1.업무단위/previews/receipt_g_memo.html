<script type="text/javascript">
	function ajaxLoader(url){ 
		if (document.getElementById) { 
			var xmlHttp = (window.ActiveXObject) ? new ActiveXObject("Microsoft.XMLHTTP") : new XMLHttpRequest(); 
		}
		if (xmlHttp){ 
			xmlHttp.onreadystatechange = function(){ 
				if (xmlHttp.readyState == 4){// 객체의 상태(0:비초기화, 1:로딩, 3:상호작용, 4: 완료)
					if(xmlHttp.status == 200){ 
						ajaxResponse(xmlHttp.responseText); 
					}else{
						alert('시스템 오류. CODE :'+ xmlHttp.status);
					}
				} 
			} 
			xmlHttp.open("GET", url, true); 
			xmlHttp.send(null); 
		}else{
			alert("지원되지 않는 브라우저입니다.");
		}
	} 

	//ajax응답처리 함수
	function ajaxResponse(respose){
		var str = respose.split("^");
		switch(str[0]){
			case "m_ok" :
				alert("등록 되었습니다");
				location.reload();
			break;
			case "m_false": 
				alert("오류!!! 다시 시도해주세요");
				location.reload();
			break;
			case "m_up_ok" :
				alert("수정 되었습니다");
				location.reload();
			break;
			case "m_up_false": 
				alert("오류!!! 다시 시도해주세요");
				location.reload();
			break;
			case "m_del_ok" :
				alert("삭제 되었습니다");
				location.reload();
			break;
			case "m_del_false": 
				alert("오류!!! 다시 시도해주세요");
				location.reload();
			break;
			default:
				alert(respose);
			break;
		}
	}

	// 글자수 제한
	function checkByte(obj) {
		var maxByte = 500; //최대 입력 바이트 수
		var str = obj.value;
		var str_len = str.length;
	 
		var rbyte = 0;
		var rlen = 0;
		var one_char = "";
		var str2 = "";
	 
		for (var i = 0; i < str_len; i++) {
			one_char = str.charAt(i);
	 
			if (escape(one_char).length > 4) {
				rbyte += 2; //한글2Byte
			} else {
				rbyte++; //영문 등 나머지 1Byte
			}
	 
			if (rbyte <= maxByte) {
				rlen = i + 1; //return할 문자열 갯수
			}
		}
	 
		if (rbyte > maxByte) {
			alert("한글 " + (maxByte / 2) + "자 / 영문 " + maxByte + "자를 초과 입력할 수 없습니다.");
			str2 = str.substr(0, rlen); //문자열 자르기
			obj.value = str2;
			checkByte(obj, maxByte);
		} else {
			//document.getElementById('byteInfo').innerText = rbyte;
		}
	}

	// 기사메모 등록
	function memo_next() {
		var m_no = document.hform.rct_no.value;
		var m_time = document.hform.m_time.value;
		var memo = document.hform.kmemo.value;
		var end = document.hform.end.value;

		if(memo == "" || memo == null)
		{
			alert("기사메모 내용을 입력해 주시기 바랍니다.");
			return;
		}

		if(end == "Y") {
			alert("처리가 완료되어 더이상 작업을 진행하실수 없습니다.");
			return;
		} else {
			var param = "mode=memo_next&form=hform&m_no="+m_no+"&m_time="+m_time+"&memo="+memo;
			ajaxLoader("ajax_proc.php?"+param);
		}
	}

	// 기사메모 수정
	function update_memo() {
		var up_no = document.hform.up_no.value;
		var memo_up = document.hform.memo_update.value;
		var end = document.hform.end.value;

		if(memo_up == "" || memo_up == null)
		{
			alert("기사메모 내용을 입력해 주시기 바랍니다.");
			return;
		}

		if(end == "Y") {
			alert("처리가 완료되어 더이상 작업을 진행하실수 없습니다.");
			return;
		} else {
			var param = "mode=memo_update&form=hform&m_no="+up_no+"&memo="+memo_up;
			ajaxLoader("ajax_proc.php?"+param);
		}
	}

	// 기사메모 수정준비 / 삭제
	function update_next(idx, mode, memo) {
		var myform = document.hform;

		var msg = "";
		if(mode == "delete") {
			msg = "삭제하시겠습니까?";
			if(confirm(msg)){
				var param = "mode=memo_del&form=hform&idx="+idx;
				ajaxLoader("ajax_proc.php?"+param);
			}
		} else {
			$("#memo_in").css("display","none");
			$("#memo_up").css("display","block");
			$("#memo_update").val(memo);
			$("#up_no").val(idx);
		}
	}
</script>
