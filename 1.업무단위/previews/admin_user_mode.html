<script>location.href='admin_user_list.php';</script><script type='text/javascript'>
	function passwd_next(idx){
		if(confirm("비밀번호 초기화를 하시겠습니까?")){
			ajaxLoader("ajax_proc.php?mode=user_passwd_change&idx="+idx);
		}
	}
	function go_next(mode){
		var myform = document.eForm ;
		if(mode =='cencle'){
			if(confirm("취소하시겠습니까?")){
				history.back();
			//	myform.action = "admin_user_list.php";
			//	myform.submit();
			}
		}else{
			if(myform.uNAME.value == ''){
				alert("성함을 입력해주세요!");
				myform.uNAME.focus();
				return;
			}
			if(myform.INDate.value == '') {
				alert("입사일자를 입력해 주시기 바랍니다.");
				myform.INDate.focus();
				return;
			}
			
			var ck_array = new Array();
			var ck=0;
			
			for(var i=1 ; i<=myform.mcount.value; i++){
				var obj = eval("document.eForm.ck_"+i);
				var obj1 = eval("document.eForm.cksub_"+i);
				
				if(obj.checked == true){
					for(var j=0; j < obj1.length; j++){
						if(obj1[j].checked == true){
							ck_array[ck] = obj1[j].value ;
							ck++;
						}
					}
				}
			}
			if(ck_array == ""){
				alert("메뉴를 한개이상 선택하세요!");
				return;
			}
			if(mode == 'insert'){
				if(myform.id_check.value == 0){
					alert("아이디 중복체크를 해주세요.");
					return;
				}
				if(!myform.uPASS.value) {
					alert("비밀번호를 입력해 주세요.");
					return;
				}
			}
			//alert(myform.uNUM.value);

			myform.menu_array.value = ck_array ;
			myform.uNUM_tmp.value = myform.uNUM.value ;
			myform.action = "admin_user_proc.php";
			myform.submit();
		}
		return;
	}
	function id_next(){
		var myform = document.eForm ;
		var userid= encodeURIComponent(myform.uNUM.value) ;	//한글은 ajax 안넘어가서 encode 처리함
		if(userid == ''){
			alert("사용하실 아이디를 입력해주세요!");
			myform.uNUM.focus();
			return;
		}
		//alert(userid);
		ajaxLoader("ajax_proc.php?mode=user_id_check&userid="+userid);
	}
	//ajax응답처리 함수
	function ajaxResponse(respose){
		var myform = document.eForm ;
		var mode_str = respose.split("^");
		switch(mode_str[0]){
			case "ok": 
				alert("초기화되었습니다.");
			break;
			case "false": 
				alert("오류!!! 다시 시도해주세요.");
			break;
			case "id":
				if(mode_str[1] == 'ok'){
					alert("사용가능");
					var div = document.getElementById("id_div");
					div.innerHTML = "<font color='blue'><B>사용가능</B></font>";
					myform.uNUM_tmp.value = myform.uNUM.value ;
					myform.id_check.value = 1 ;
					myform.uNUM.disabled = true;
					
				}else{
					alert("이미사용중입니다.");
					myform.uNUM.value = "";
					myform.uNUM.focus();
				}
			break;
		}
	}
	function u_change() {
		var myform = document.eForm;
		var uYN = myform.uYN.value;

		if(uYN == "Y") {
			$("#uYN_Y").css("display","block");
			$("#uYN_N").css("display","none");
			document.eForm.OUTDate.value = "";
		} else {
			$("#uYN_Y").css("display","none");
			$("#uYN_N").css("display","block");
		}
	}
	//메뉴 체크 확인(전체 선택/ 해지)
	function check_all(idx){
		var obj = eval("document.eForm.ck_"+idx);
		var obj1 = eval("document.eForm.cksub_"+idx);

		for(var i=0; i < obj1.length; i++){
			if(obj.checked == true)	obj1[i].checked = true;
			else obj1[i].checked = false;
		}
	}
	//메뉴 개별 선택
	function check_one(idx){	
		var obj = eval("document.eForm.ck_"+idx);
		var obj1 = eval("document.eForm.cksub_"+idx);
		var check_cnt = 0;
		for(var i=0; i < obj1.length; i++){
			if(obj1[i].checked == true) check_cnt++;
		}
		
		if(check_cnt > 0 ) obj.checked = true;
		else obj.checked = false;
	}
