<script type='text/javascript'>
	
	function keyDown(){
		if(event.KeyCode == 13){
			search_next();
		}
	}
	function search_next(){
		var myform = document.eForm ; 
		myform.pageno.value = 1 ;
		myform.action = "/html/store_request_mater_list.php";
		myform.target = "";
		myform.submit();
	}
	
	function add_item(){
		var save=parent.mater.list_form.val.value;
		var fail="";
		var arr = save.split(';');
		var j=0;
		
		$('input:checkbox[name="select_call"]').each(function(){
	      	if(this.checked){
	      		if(!arr.inArray(this.value)){
	      			save+=this.value + ";";
					j++;
	      		} else {
	      			fail+=this.value + ";";
	      		}
	      	}
		});
		
		if(!j){alert('추가로 선택된 자재가 없습니다.');return ;}
		if(fail)alert(fail+'은 이미 등록되어있습니다.');

		parent.mater.list_form.val.value=save;
		parent.mater.list_form.submit();
	}

	Array.prototype.inArray = function(needle){
	     for(var i=0, len=this.length ; i < len ; i++){
	          if(this[i] === needle){
	               return true;
	          }
	     }
	     return false;
	}

	//전체선택
    function all_check() {
	      if($('#allagree').is(":checked") == true){
	         $('input:checkbox[name="select_call"]').attr("checked",true);
	      }else {
             $('input:checkbox[name="select_call"]').attr("checked",false);
          }
 	}
</script>

				모품번 : <INPUT TYPE="text" NAME="pp_no" size="10" value="">
				품번 : <INPUT TYPE="text" NAME="p_no" size="10" value="">
				CS품명 : <INPUT TYPE="text" NAME="p_name" size="10" value="">
				재고 : 
				<select name="keyfield">
					<option value="" selected>전체</option>
					<option value="Y" >유(有)</option>
				</select>
				<input type="image" src="../assets/images/btn/btn-search.png" alt="검색" onkeydown="javascript:keyDown();" onclick="javascript:search_next();"/>
				<input type='hidden' name='idx'>
				<input type='hidden' name='mode'>
				<input type='hidden' name='pageno' value='1'>
				<input type='hidden' name='Tidx' value=''>

		<div class="data-table" style='width:600px;'>

				<thead>

						<th><input type="checkbox" id="allagree" name="allagree" onclick='javascript:all_check();'></th>

						<th>재생</th>

					</tr>

				</tbody>

		</div>

					<span class="bg">&nbsp;</span>
					<span class="text">추가</span>
			</a>

	</div>
</div>
