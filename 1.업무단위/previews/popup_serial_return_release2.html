<script type="text/javascript">
	function go_submit(cnt) {
		var myform = document.hform ;
		//alert(myform.mode.value);
		var msg = "";
		var s_cnt=0;
		var s_cnt1=0;
		var s_cnt2=0;
		for(var i=0; i < cnt ; i++) {
			if($("#r_snumber_"+i).val() == '' && $("#serial_type_"+i).val() != '') {
				alert("반납시리얼을 입력해 주세요.");
				$("#r_snumber_"+i).focus();
				return ;
			}
			if($("#r_snumber_"+i).val() != '' && $("#serial_type_"+i).val() == '') {
				alert("반납등급을 선택해 주세요.");
				$("#serial_type_"+i).focus();
				return;
			}
			// 반납시리얼 및 반납상태가 한개라도 선택이 된경우라면 두개다 선택되어야 진행가능
			// 둘다 공백이면 무시
			
			if($("#r_snumber_"+i).val() != '' && $("#r_succes_"+i).val() == '' ) s_cnt++;
			if($("#r_succes_"+i).val() != '' ) s_cnt1++;
			if($("#r_snumber_"+i).val() == '' && $("#r_succes_"+i).val() == '' ) s_cnt2++;
		}

		if((cnt - s_cnt1 - s_cnt2) <= 0) {
			alert("반품신청할 이력이 없습니다. 시리얼을 입력해 주세요.");
			return ;
		}
		//alert(cnt +" | "+s_cnt1 +" | "+s_cnt2);
		msg += "반납 : "+s_cnt+"\r\n";
		msg += "미반납 : "+parseInt(s_cnt2)+"\r\n\r\n";
		msg += "반납처리 하시겠습니까?";
		
		if(confirm(msg)) {
			myform.scnt.value = parseInt(cnt - s_cnt) ;
			myform.action = "popup_serial_return_release2_proc.php";
			myform.submit();
		}
	}
	
	function update_next(i,mode) {
		var idx = $("#idx_"+i).val();	//관리번호
		var str ="";
		// 확정시 임시로 input 값배정해두고 취소시 다시 원복하는 형태로 처리할 예정
		if(mode == 'update') {
			$("#r_succes_"+i).val('2');
			str = "<a href=\"javascript:update_next('"+i+"','delete')\" class=\"btn1 btn-sms btn-color7\" title=\"취소\"><span class=\"bg\">&nbsp;</span><span class=\"text\">취소</span>";
		} else if(mode == 'delete') {
			$("#r_succes_"+i).val('1');
			str = "<a href=\"javascript:update_next('"+i+"','update')\" class=\"btn1 btn-sms btn-color1\" title=\"확정\"><span class=\"bg\">&nbsp;</span><span class=\"text\">확정</span>";
		}
		$("#td_btn").html(str);
	}
</script>
