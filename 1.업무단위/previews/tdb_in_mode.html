<script type='text/javascript'>
	
	function go_next(mode){
		var myform = document.eForm ;
		if(mode == 'cencle') {
			if(confirm("리스트로 돌아가시겠습니까?")) {
				myform.action = "tdb_in_list.php";
				myform.submit();
			}
		}else {
			if(mode == 'insert') {
				if(myform.apt_no.value == "") {
					alert("현장선택이 되지 않았습니다.");
					return ;
				}
				if(myform.tdb_date.value =="") {
					alert("뇌전일을 선택해 주세요.");
					myform.tdb_date.focus();
					return ;
				}
				if(myform.model_name.value == "") {
					alert("모델명이 없습니다. \r\n\r\n현장관리에서 낙뢰로 모델을 등록후 진행해주세요!");
					return ;
				}
				if(!confirm("뇌전 접수를 하시겠습니까?")) return ;
				myform.action = "tdb_in_proc.php";
				myform.submit();
			} else if(mode == 'update') {
				
				if(myform.insurance.value =="") {
					alert("보험사타입을 선택해주세요.");
					myform.insurance.focus();
					return ;
				}
				if(myform.insurance_name.value == '') {
					alert("보험사 업체명을 입력해 주세요.");
					myform.insurance_name.focus();
					return ;
				}
				
				if(!confirm("뇌전 접수 정보를 수정하시겠습니까?")) return ;
				myform.action = "tdb_in_proc.php";
				myform.submit();
			}
		}
	}

	// 삭제
	function update_next(idx,mode,f){
		if(mode == "deleteETC") {
			if(confirm("정말로 삭제하시겠습니까?")){
				ajaxLoader("ajax_proc.php?mode=tdb_etc_del&idx="+idx+"&tr="+f);
			}
		}else if(mode =='insert') {
			var s = $("input[name='subject']").val();
			var c = $("#content").val();
			f = $("#ecnt").val();
			var param = "&idx="+idx+"&tr="+f+"&subject="+encodeURIComponent(s)+"&content="+encodeURIComponent(c) ;
			//alert(param);
			ajaxLoader("ajax_proc.php?mode=tdb_etc_ins"+param);
		}
	}

	// 뇌전 담당지점 변경
	function ch_cen() {
		var myform = document.eForm;
		var rct_no = myform.rct_no.value;
		var center = myform.centerCode.value;

		var msg = "뇌전 담당지점을 변경하시겠습니까?";

		if(confirm(msg)) {
			ajaxLoader("ajax_proc.php?mode=tdb_change&rct_no="+rct_no+"&center="+center);
		}
	}

	//ajax응답처리 함수
	function ajaxResponse(respose){
		var str = respose.split("^");
		switch(str[0]){
			case "del_ok" :
				alert("삭제되었습니다.");
				$("#tr_"+str[1]).remove() ;	//해당열삭제
			break;
			case "ins_ok" :
				var str2 = "<table width='100%'><tr id='tr_"+str[1]+"'><td class='left'>";
						str2+= "<strong>제목</strong> : "+str[2]+" &nbsp;";
						str2+= "<a href=\"javascript:update_next('"+str[4]+"','deleteETC','"+str[1]+"')\" class=\"btn1 btn-sms btn-color5\" title=\"삭제\"><span class=\"bg\">&nbsp;</span><span class=\"text\">삭제</span></a><br>";
						str2+= "<strong>내용</strong> : "+str[3]+"</td></tr></table>";
						
				//alert(str2);
				$("#tr_content").append(str2);
				$("#ecnt").val(parseInt(str[1])+1);	//tr 아이디주기위해 존재
			break;
			case "tdb_change_ok" :
				alert("담당센터가 변경되었습니다.");
				location.reload();
			break;
			case "tdb_change_false" :
				alert("뇌전 담당지점 변경이 실패하였습니다.");
			break;
		}
	}
	
	function open_file(filenm) {
		window.open('../filedir/tdb/'+filenm,'pdf_viewer','menubar=no');
	}
	
	//자재신청이 되었을경우 리스트 보여주는 팝업

	}
