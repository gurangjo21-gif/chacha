<script type="text/javascript">
	function go_submit(cnt) {
		var myform = document.hform ;
		//alert(myform.mode.value);
		var s_cnt = 0;
		var msg = "";
		for(var i=0; i < cnt ; i++) {
			if($("#serial_"+i).val() != "" ){ 
				if($("#serial_type_"+i).val() == "" ){ 
					alert("반납등급을 선택해주세요.");
					$("#serial_type_"+i).focus();
					return ;
				}else {
					s_cnt++;
				}
			}else if($("#serial_type_"+i).val() != "" ){
				if($("#serial_"+i).val() == "" ){ 
					alert("시리얼을 입력해주세요.");
					$("#serial_"+i).focus();
					return ;
				}
			}
		}

		/*if(scnt <= 0) {
			alert("반품된 갯수가 없습니다. 다시 확인해 주세요.");
			return;
		}
		var msg = "";
		var s_cnt=0;
		var s_cnt2=0;
		for(var i=0; i < cnt ; i++) {
			if($("#serial_"+i).val() != "" && $("#r_succes_"+i).val() == '2' ) s_cnt++;
			if($("#serial_"+i).val() != "" && ($("#r_succes_"+i).val() == '1' || $("#r_succes_"+i).val() == '') ) s_cnt2++;
		}*/
		//alert(scnt + ' | ' +s_cnt);
		//var cnt2 = parseInt(scnt - s_cnt) ;	//출고-확정갯수
		
//		msg += "확정완료 : "+cnt2+"\r\n";
//		msg += "미확정 : "+s_cnt+"\r\n\r\n";
		msg += "반납 : "+s_cnt+"\r\n";
		msg += "미반납 : "+parseInt(cnt - s_cnt)+"\r\n\r\n";
		msg += "반납 하시겠습니까?";
		
		if(confirm(msg)) {
			myform.scnt.value = parseInt(cnt - s_cnt) ;
			myform.action = "popup_return_proc.php";
			myform.submit();
		}
	}
	
	function update_next(i,mode) {
		var idx = $("#idx_"+i).val();	//출고번호
		var str ="";
		// 확정시 임시로 input 값배정해두고 취소시 다시 원복하는 형태로 처리할 예정
		if(mode == 'update') {
			$("#r_succes_"+i).val('2');
			str = "<a href=\"javascript:update_next('"+i+"','delete')\" class=\"btn1 btn-sms btn-color7\" title=\"취소\"><span class=\"bg\">&nbsp;</span><span class=\"text\">취소</span>";
		} else if(mode == 'delete') {
			$("#r_succes_"+i).val('1');
			str = "<a href=\"javascript:update_next('"+i+"','update')\" class=\"btn1 btn-sms btn-color1\" title=\"확정\"><span class=\"bg\">&nbsp;</span><span class=\"text\">확정</span>";
		}
		$("#td_btn_"+i).html(str);
	}

	// 반납연장
	function return_renewal(idx,r_date,r_num) {
		var msg = "반납기한을 연장하시겠습니까?";

		if(confirm(msg)) {
			ajaxLoader("ajax_proc.php?mode=return_renewal&idx="+idx+"&r_date="+r_date+"&r_num="+r_num);
		}
	}

	function ajaxResponse(respose){
		//return 없음
		//alert(respose);
		var mode_str = respose.split("^");

		switch(mode_str[0]) {
			case "renuwal_ok" :
				alert("반납기한이 연장되었습니다.");
				location.reload();
			break;
			case "renewal_false" :
				alert("반납연장이 실패하였습니다. 다시 시도해 주시기 바랍니다.")
				return;
			break;
			default :
				alert(respose);
			break;
		}
	}
</script>
