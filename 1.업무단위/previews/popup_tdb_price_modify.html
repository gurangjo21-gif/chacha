<script type="text/javascript">
	function go_submit(idx,user_id) {
		var myform = document.hform;
		var returnA = myform.return_A.value;
		var retreA = myform.retre_A.value;
		var returnR = myform.return_R.value;
		var retreR = myform.retre_R.value;
		var maintenance = myform.maintenance.value;

		if(confirm('금액을 수정하시겠습니까?')) {
			ajaxLoader("ajax_proc.php?mode=tdb_price_modify&idx="+idx+"&returnA="+returnA+"&retreA="+retreA+"&returnR="+returnR+"&retreR="+retreR+"&maintenance="+maintenance+"&user_id="+user_id);
		}
	}

	function ajaxResponse(respose) {
		var str = respose.split("^");
		switch(str[0]) {
			case "ok" :
				alert("금액이 수정되었습니다.");
				opener.location.reload(true);
				self.close();
			break;
			case "false" :
				alert("오류!!! 다시 시도해 주세요.");
				return;
			break;
			default :
				alert(respose);
			break;
		}
	}
</script>
