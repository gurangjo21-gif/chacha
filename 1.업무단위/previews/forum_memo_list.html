<script type='text/javascript'>
	
	function search_next(){
		var myform = document.eForm ; 
		myform.pageno.value = 1 ;
		myform.action = "/html/forum_memo_list.php";
		myform.target="";
		myform.submit();
	}
	
	function update_next(idx,mode){
		var myform = document.eForm ;
		myform.idx.value = idx;
		myform.mode.value = mode;
		if(mode == "delete") {
			if(confirm("정말로 삭제하시겠습니까?")){
				ajaxLoader("ajax_proc.php?mode=forum_memo_del&idx="+idx);
			}
		}else{
			myform.action = "forum_memo_mode.php";
			myform.target="";
			myform.submit();
		}
	}

	function detail_ajax(idx) {
		if($("#detail_"+idx).css("display") == "none"){
			$("#detail_"+idx).css("display","");
			
			//읽음 카운트 +1
			ajaxLoader("ajax_proc.php?mode=forum_memo_count&idx="+idx);
			
		}else{
			$("#detail_"+idx).css("display","none");			
		}
	}

	function detail_mode(idx) {
		if($("#detail_"+idx).css("display") == "none"){
			$("#detail_"+idx).css("display","");		
			
		}else{
			$("#detail_"+idx).css("display","none");			
		}
	}
	
	//ajax응답처리 함수
	function ajaxResponse(respose){
		var str = respose.split("^");
		switch(str[0]){
			case "count" :
				$("#cnt_"+str[1]).text('확인');
			break;
			case "del_ok" :
				alert("삭제되었습니다.");
				search_next();
			break;
			case "del_false" :
				alert("오류!!! 다시 시도해주세요.");
				search_next();
			break;
		}
	}
	function show_tab(idx,moding){
		var myform = document.eForm ;
		myform.moding.value = moding;
		search_next();
	}
</script>
