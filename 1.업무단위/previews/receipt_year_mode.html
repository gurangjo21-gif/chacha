	//ajax응답처리 함수
	function ajaxResponse(respose){
		//alert(respose);
		var mode_str = respose.split("^");
		var str = respose.split("^");
		switch(mode_str[0]){
			case "ERRORSEL" :	//장애코드 선택
				var str = mode_str[1].split("||");
				var cnt = str.length ;
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = str[i].split("@");
						if(i == 0) $("#err_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#err_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;
			case "SEL_AGENCY" :
				var sel_str = mode_str[1].split("||");
				//alert(sel_str);
				var cnt = sel_str.length ;
				for(var i=0; i < cnt ; i++) {
					if(sel_str[i] != '') {
						var sel = sel_str[i].split("@");
						if(i == 0) $("#chargeName").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#chargeName").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;
			case "ZIP_SELECT1" :
				var str = mode_str[1].split("|");
				$("select[name='centerCode']").val(str[0]);	//지점코드

				$.getJSON(
					'ajax_proc.php',
					'mode=SEL_AGENCY1&form=year_form&val='+str[0],
					
					function(res) {
						var sRtn = '<option value="">:: 처리기사 선택 ::</option>';
						$.each(res, function(k, obj) {
							if(str[1] == obj.charge_code){
								var charge_select = "selected";
							} else {
								var charge_select = "";
							}

							sRtn += '<option value="'+obj.charge_code+'"'+charge_select+'>'+obj.charge_name+'</option>';
						});
						$('select[name=chargeName]').html(sRtn);
					});
			break;
			case "mm_ok": 
				alert("등록 되었습니다");
				location.reload();
			break;
			case "mm_false": 
				alert("오류!!! 다시 시도해주세요");
				return;
			break;
			case "mmm_ok": 
				alert("삭제 되었습니다");
				location.reload();
			break;
			case "mmm_false": 
				alert("오류!!! 다시 시도해주세요");
				return;
			break;
			case "up_ok":
				alert("수정 되었습니다.");
				location.reload();
			break;
			case "up_false":
				alert("오류!!! 다시 시도해주세요");
				return;
			break;
			default :
				alert(respose);
			break;
		}
	}

	function message_next() {
		var myform = document.year_form;
		var sno = myform.idx.value;
		var mtime = myform.m_time.value;
		var message = myform.smessage.value;
		var id = myform.uid.value;
		if(message == "" || message == null) {
			alert("전달사항 내용을 입력해 주시기 바랍니다.");
			return;
		}

		var param = "mode=message_next&form=year_form&s_no="+sno+"&m_time="+mtime+"&message="+message+"&id="+id;
		ajaxLoader("ajax_proc.php?"+param);
	}

	function message_update() {
		var myform = document.year_form;
		var up_no = myform.up_no.value;
		var message_up = myform.smessage_up.value;

		if(message_up == "" || message_up == null) {
			alert("전달사항 내용을 입력해 주시기 바랍니다.");
			return;
		}

		var param = "mode=message_update&form=year_form&no="+up_no+"&message="+message_up;
		ajaxLoader("ajax_proc.php?"+param);
	}

	$(function(){
		/* 클릭 클릭시 클릭을 클릭한 위치 근처에 레이어가 나타난다. */
		$('.tooltip').mouseover(function(e){
			//alert($(this).attr('title'));
			var sWidth = window.innerWidth;
			var sHeight = window.innerHeight;

			var oWidth = $('.popupLayer').width();
			var oHeight = $('.popupLayer').height();

			// 레이어가 나타날 위치를 셋팅한다.
			var divLeft = e.clientX + 10;
			var divTop = e.clientY + 5;

			// 레이어가 화면 크기를 벗어나면 위치를 바꾸어 배치한다.
			if( divLeft + oWidth > sWidth ) divLeft -= oWidth;
			if( divTop + oHeight > sHeight ) divTop -= oHeight;

			// 레이어 위치를 바꾸었더니 상단기준점(0,0) 밖으로 벗어난다면 상단기준점(0,0)에 배치하자.
			if( divLeft < 0 ) divLeft = 0;
			if( divTop < 0 ) divTop = 0;
			
			$("#tooltip_content").html($(this).attr('value'));

			$('.popupLayer').css({
				"top": divTop,
				"left": divLeft,
				"position": "absolute"
			}).show();
		}).mouseout(function(){
			$('.popupLayer').hide();
		});
		
		/*$( "#regdate" ).datepicker({

	    $( "#basedate" ).datepicker({
