<script type="text/javascript">
	//ajax
	function ajaxLoader(url){ 
		if (document.getElementById) { 
			var xmlHttp = (window.ActiveXObject) ? new ActiveXObject("Microsoft.XMLHTTP") : new XMLHttpRequest(); 
		}
		if (xmlHttp){ 
			xmlHttp.onreadystatechange = function(){ 
				if (xmlHttp.readyState == 4){// 객체의 상태(0:비초기화, 1:로딩, 3:상호작용, 4: 완료)
					if(xmlHttp.status == 200){ 
						ajaxResponse(xmlHttp.responseText); 
					}else{
						alert('시스템 오류. CODE :'+ xmlHttp.status);
					}
				} 
			} 
			xmlHttp.open("GET", url, true); 
			xmlHttp.send(null); 
		}else{
			alert("지원되지 않는 브라우저입니다.");
		}
	} 
	//ajax응답처리 함수
	function ajaxResponse(respose){
		//alert(respose);
		var myform = document.searchForm ;
		var mode_str = respose.split("^");
		alert(mode_str[2]);
		switch(mode_str[0]){
			case "exists":
				myform.errorMsg1.value = "";
				myform.errorMsg1.focus();
			break;
			case "ok": 		
			case "use_ok":
			case "false_namechange":
				parent.search_next(mode_str[1],'reason');	
			break;
			case "ok_namechange":
				parent.location.href="admin_code_list.php";
			break;
			case "false": 	
				myform.errorMsg1.focus();					
			break;
			case "use_false":	//사용유무 변경실패
			default:
			break;
		}
	}
	
	// 페이지 로드시 display 설정
	function display_mode(bcode,mode,idx) {
		if(mode == "") {	//입력
			if(bcode == "" ) {
				$("#detail_1").css("display","");
				$("#detail_2").css("display","none");
				$("#detail_3").css("display","none");
			}else{
				$("#detail_1").css("display","none");
				$("#detail_2").css("display","");
				$("#detail_3").css("display","none");
			}
		}else{	//수정
			if(!confirm("코드명을 바꾸게 되면 기존 코드명으로 등록된 모든데이터의 내용이 변경됩니다.\n\n그래도 코드명 변경을 하시겠습니까?"))return false;
			$("#detail_1").css("display","none");
			$("#detail_2").css("display","none");
			$("#detail_3").css("display","");
			$("#idx").val($("#bcode_"+idx).text());
			$("#errorMsg3").val($("#bname_"+idx).text());
			$("#bCODE").val(bcode);
		}
	}
	
	function update_next(bcode,stat) {
		var myform = document.searchForm ;
		var codeName = "";
		if(stat == "update") {
			codeName = myform.errorMsg3.value;
			bcode = $("#idx").val();
			mcode = $("#bCODE").val();
		} else {
			if(bcode == "") codeName = myform.errorMsg1.value;
			else codeName = myform.errorMsg2.value;
		}
		//alert(bcode+ " | "+stat+" | "+codeName);
		ajaxLoader("ajax_proc.php?mode=admin_code_reason&idx="+bcode+"&stat="+stat+"&codeName="+codeName);
		//ajaxLoader("ajax_proc.php?mode=admin_code_reason&idx="+bcode+"&stat="+stat+"&codeName="+codeName+"&bCODE="+bCODE);
	}
	
	// 사용유무 변경처리
	function use_upate(bcode,bstat,code,stat){
		if (confirm('선택하신 코드'+code+'의 상태를 변경 하시겠습니까?')) {
			ajaxLoader("ajax_proc.php?mode=admin_code_reason_useyn&idx="+code+"&stat="+stat+"&bcode="+bcode+"&bstat="+bstat);
		}
	}
</script>
