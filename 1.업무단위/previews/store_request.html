<script type='text/javascript'>
	//신청사원 변경시 아이디 동시변경되도록 처리
	/*function agent_change(val) {

	//초기화
	function reset() {
		location.href = location.href ;

	function req_mode(mode,st){
		
			var sc = $("#sub_cnt").val() ;
			var sc2 = $("#sub_cnt2").val() ;
			
			var subcnt = parseInt(sc) - parseInt(sc2);
			if(subcnt <= 0) {
				alert("자재를 한개이상 선택해 주세요.");
				return ;
			}
			
			for(var i=0;i < sc; i++) {
				if($("#s_no_"+i).val() == "") {
					// 모델품번이 존재하지 않기때문에 삭제된 값으로 판단
				} else {
					// 진행가능
					if($("#s_type_"+i).val() =="") {
						alert("유/무상 값은 필수값입니다.");
						$("#s_type_"+i).focus();
						return ;
					}
					if($("#s_cnt_"+i).val() =="" || $("#s_cnt_"+i).val() <= 0) {
						alert("신청수량은 필수값입니다.");
						$("#s_cnt_"+i).focus();
						return ;
					}
				}
			}
			
			//if(!eForm.ps_agent.value){alert("신청사원을 선택하셔야 합니다.");eForm.ps_agent.focus();return ;}
			var msg = '신청의뢰하시겠습니까?';
			if(mode == 'update') msg = '처리완료된 건입니다. 수정하시겠습니까?';
			
			if(!confirm(msg))return ;
			eForm.mode.value = mode;
			eForm.action = "store_request_proc.php";
			eForm.submit();
		
	}
	function list_go() {
		//location.href = "store_receipt_list.php";
		history.back();
	}

	// 증복되는 자품번 추가한게 있는지 체크
	function exists_model(m_id) {
		var sc = $("#sub_cnt").val() ;
		var ck='F';
		for(var i=0;i < sc; i++) {
			//alert($("#s_no_"+i).val());
			if($("#s_no_"+i).val() == "" || $("#s_no_"+i).val()==undefined) {
				// 모델품번이 존재하지 않기때문에 삭제된 값으로 판단
				continue ;
			} else {
				// 진행가능
				if($("#s_no_"+i).val() == m_id) ck='T';
			}
		}
		return ck ;
	}
	
	function insert_model(m_id , m_name) {		
		var sc = $("#sub_cnt").val() ;
		
		var str = "<tr id='tr_"+sc+"'>"
			+"<Td><input type='text' name='s_no_"+sc+"' id='s_no_"+sc+"' value='"+m_id+"' style='width:80px;' readonly></td>"
			+"<Td><input type='text' name='s_name_"+sc+"' id='s_name_"+sc+"' value='"+m_name+"' style='width:95%;' readonly></td>"
			+"<td>"
				+"<select name='s_type_"+sc+"' id='s_type_"+sc+"'  style='width:60px;'>"
								+"</select>"
			+"</td>"
			+"<td><input type='text' name='s_cnt_"+sc+"' id='s_cnt_"+sc+"' value='' style='width:60px;'></td>"
			+"<td><input type='text' name='s_app_"+sc+"' id='s_app_"+sc+"' value='' style='width:60px;'></td>"
			+"<td><input type='text' name='s_ha_"+sc+"' id='s_ha_"+sc+"' value='' style='width:60px;'></td>"
			+"<td><input type='text' name='s_os_"+sc+"' id='s_os_"+sc+"' value='' style='width:60px;'></td>"
			+"<td><input type='text' name='s_memo_"+sc+"' id='s_memo_"+sc+"' value='' style='width:95%'></td>"
			+"<td><input type='hidden' name='s_status_"+sc+"' id='s_status_"+sc+"' value='1'>미신청</td>"
			+"<TD><a href=\"javascript:update_next('"+sc+"','delete')\" class='btn1 btn-sms btn-color5' title='삭제'><span class='bg'>&nbsp;</span><span class='text'>삭제</span></a></TD>"
		    +"</tr>";
		    //alert(str);
		var tf = exists_model(m_id);
		if(tf == 'F') {
			$("#tr_content").append(str);
			$("#sub_cnt").val(parseInt(sc)+1);	//tr 아이디주기위해 존재
		} else {
			alert("이미 추가된 자재품번입니다. \r\n\r\n다른 자재를 선택해주세요.");
			return ;
		}
	}

	function update_next(i,mode) {
		if(mode=='delete') {
			var sc = $("#s_status_"+i).val() ;
			var idx = $("#s_no_"+i).val();
			if(sc == '' || sc == '1' || sc == '4') {
				//삭제시 등록된 처리품목이라면 삭제처리한다.
				var param = "&mode=store_request_delete&idx="+idx+"&i="+i+"&req_no="+$("input[name='req_no']").val();
				ajaxLoader("ajax_proc.php?"+param);
				$("#tr_"+i).remove() ;	//해당열삭제
				
				$("#sub_cnt2").val(parseInt($("#sub_cnt2").val())+1);
			} else {
				//부분출고 , 출고대기 , 출고완료는 삭제불가
				alert("삭제 불가입니다.");
				return ;
			}
		}
	}
</script>
