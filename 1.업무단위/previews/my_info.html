<script type='text/javascript'>
	function go_next(){
		var myform = document.eForm ;
		
		if(myform.pass1.value == ''){
			alert("비밀번호를 입력해주세요!");
			myform.pass1.focus();
			return ;
		}
		if(myform.pass1.value.length < 6 || myform.pass1.value.length > 20){
			alert("비밀번호는 6~20자리까지 입력해주세요.");
			myform.pass1.focus();
			return ;
		}
		if(myform.pass2.value == ''){
			alert("비밀번호 확인을 입력해주세요!");
			myform.pass2.focus();
			return ;
		}
		if(myform.pass1.value != myform.pass2.value){
			alert("비밀번호가 일치하지않습니다. 다시입력해주세요.");
			myform.pass2.value = "";
			myform.pass2.focus();
			return ;
		}
		
		var useridx = "demo";
		var param = "&useridx="+useridx
					+"&uNAME="+encodeURIComponent(myform.uNAME.value)
					+"&pass1="+myform.pass1.value
					+"&tel1="+myform.tel1.value
					+"&tel2="+myform.tel2.value ;
		ajaxLoader("ajax_proc.php?mode=my_info"+param);
		
		return;
	}

	//ajax응답처리 함수
	function ajaxResponse(respose){
		var myform = document.eForm ;
		var mode_str = respose.split("^");
		switch(mode_str[0]){
			case "ok": 
				alert("수정되었습니다.");
				self.close();
			break;
			case "false": 
				alert("오류!!! 다시 시도해주세요.");
			break;
			default:
				alert(respose);
			break;
		}
	}
</script>
