	function req_mode(mode){
		var myform = document.eForm ;
		var msg = '신청서를 제출하시겠습니까?';
		if(mode == 'update') msg = '신청서를 수정하시겠습니까?';
		
		if(myform.charge.value == "") {
			alert("고객명을 입력해 주세요!");
			myform.charge.focus();
			return ;
		}
		if(myform.telno.value == "") {
			alert("연락처를 입력해 주세요!");
			myform.telno.focus();
			return ;
		}
		if(myform.addr1.value == "") {
			alert("주소를 입력해 주세요!");
			myform.addr1.focus();
			return ;
		}
		
		if(!confirm(msg))return ;
		
		myform.mode.value = mode;
		myform.action = "store_suri_proc.php";
		myform.submit();
	}
