	function move_menu(menu){
		switch(menu){

			//	url = "admin_scene_list.php?Tidx=1&Sidx=5&p_mode=g";
				top.content.info.r_content.rct.location.href = "./admin_scene_list.php?p_mode=g";
				if(apt_no != ""){

				break;

					for(i = 0; i < 2; i++) {

				} else {
					top.content.info.r_content.rct.location.href = "./receipt_consult_list.php?Tidx=1&Sidx=1&p_mode=g";
				}
				break;

				/*if($("#model_no").val() != "" && $("#model_name").val() != ""){	//품번

				} else if(apt_no != ""){
					url += "&anum="+apt_no;
				}*/

			case 5:	//특이사항
				top.content.info.r_content.rct.location.href = "./receipt_memo_list.php?Tidx=1&Sidx=7&p_mode=g";
				/*if($("#err_1").val() != ""){	//장애코드(대)

				}*/

				top.content.info.r_content.rct.location.href = "./receipt_callback_list.php?Tidx=1&Sidx=2&p_mode=g";
