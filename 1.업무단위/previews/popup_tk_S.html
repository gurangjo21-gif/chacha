  oCell.innerHTML = frmTag;
}

function insert_SB(num)
{
	var myform = document.hform;
	var apt_no = myform.apt_no.value;
	var dong = myform.dong.value;
	var tkman = myform.tkman.value;
	var tkuser = myform.tkuser.value;
	var add_sd = $("#tkS"+num).val();
	var add_sd_e = $("#tkS_e"+num).val();
	var lname = $("#l_name"+num).val();

	var sd_num = Number(add_sd);
	var sd_e_num = Number(add_sd_e);

	if(!add_sd || !add_sd_e)
	{
		alert("라인을 입력해주시기 바랍니다.");
		add_sd.focus();
		return;
	}

	if(sd_num > sd_e_num)
	{
		alert("마지막층을 올바르게 입력해주시기 바랍니다.");
		add_sd.focus();
		return;
	}

	myform.action = "popup_tk_S_proc.php?add_sd="+add_sd+"&add_sd_e="+add_sd_e+"&line="+lname;
	myform.submit();

	//ajaxLoader("ajax_proc.php?mode=insert_tk&apt_no="+apt_no+"&dong="+dong+"&tkman="+tkman+"&gy_a="+add_gy);

	//$("#insert_G"+num).hide;
	//$("#del"+num).show;
}

// 라인 삭제
function line_del(num) {
	var myform = document.hform;
	var apt_no = myform.apt_no.value;
	var dong = myform.dong.value;

	var msg = "선택하신 라인을 삭제하시겠습니까?";

	if(confirm(msg)) {
		ajaxLoader("ajax_proc.php?mode=tk_line_delete_S&apt_no="+apt_no+"&dong="+dong+"&line="+num);
	}	
}


// 라인 삭제 respone
function ajaxResponse(respose)
{
	//alert(respose);
	var mode_str = respose.split("^");

	switch(mode_str[0]) {
		case "del_ok" :
			alert("선택하신 라인이 삭제되었습니다.");
			location.reload();
		break;
		case "del_false" :
			alert("라인 삭제가 실패하였습니다. 다시 시도해 주시기 바랍니다.");
		break;
		case "tk_del_fail" :
			alert("선택하신 세대 중 완료처리가 된 세대가 있어 삭제가 불가능 합니다.");
		break;
		default :
			alert(respose);
		break;
	}
}

function line_detail(num) {
	var myform = document.hform;
	var apt_no = myform.apt_no.value;
	var dong = myform.dong.value;
	var tkman = myform.tkman.value;
	var tkuser = myform.tkuser.value;

	myform.action = "popup_tk_S_detail.php?apt_no="+apt_no+"&line="+num+"&dong="+dong+"&mode="+mode+"&tkman="+tkman+"&tkuser="+tkuser;
	myform.submit();
}
