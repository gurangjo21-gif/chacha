<script type='text/javascript'>
	
	function search_next(){
		var myform = document.eForm ; 
		myform.pageno.value = 1 ;
		myform.action = "/html/pop_admin_scene_list.php";
		myform.target="";
		myform.submit();
	}
	
	function update_next(idx,mode){
		var myform = document.eForm ;
		myform.idx.value = idx;
		myform.mode.value = mode;
		if(mode == 'detail') {
			myform.action = "admin_scene_detail.php";
		}else{
			myform.action = "admin_scene_mode.php";
		}
		myform.target="";
		myform.submit();
	}
	function bDel_next(idx){
		var msg = "삭제 하시겠습니까?";
		if(confirm(msg)){
			ajaxLoader("ajax_proc.php?mode=admin_scene_del&idx="+idx);
		}
	}
	//ajax응답처리 함수
	function ajaxResponse(respose){
		var mode_str = respose.split("^");
		switch(mode_str[0]){
			case "ok": 
				alert("삭제 되었습니다.");
				search_next();
			break;
			case "false": 
				alert("오류!!! 다시 시도해주세요.");
				search_next();
			break;
		}
	}
	
	function excel_download(){
		var myform = document.eForm ;
		myform.action = "../excel/admin_scene_list.php";
		myform.target = "ifrm_trans";
		myform.submit();
	}
</script>
