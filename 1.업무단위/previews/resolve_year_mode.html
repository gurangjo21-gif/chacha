	// 부가세 포함
	function vat_next() {
		var myform = document.input_form;
		var vat = $("input[type=radio][name=vat]:checked").val();
		var vat_go = myform.vat_go.value;
		var pay1 = myform.pay1.value;
		var pay2 = myform.pay2.value;
		var gongim = myform.price_gongim.value;
		var sobi = myform.sobi_price.value;
		var gugan = myform.price_gugan.value;
		var total_sobi = myform.total_sobi.value;
		var mode = myform.mode.value;
		var i = 10;
		//alert(vat);

		if(vat_go == "yes") {
			if(mode == "update") {
				if(vat == "Y") {
					//total_sobi_a = parseInt(total_sobi)/parseInt(i);
					total_sobi_a = parseInt(sobi)/parseInt(i);
					//total_sobi_all = parseInt(total_sobi) + parseInt(total_sobi_a);
					total_sobi_all = parseInt(sobi) + parseInt(total_sobi_a);
					gongim_a = parseInt(gongim)/parseInt(i);
					gongim_all = parseInt(gongim) + parseInt(gongim_a);

					myform.pay1.value = parseInt(gongim_all) + parseInt(total_sobi_all) + parseInt(gugan);
					myform.pay2.value = parseInt(gongim_all) + parseInt(total_sobi_all) + parseInt(gugan);
				} else {
					myform.pay1.value = parseInt(gongim) + parseInt(sobi) + parseInt(gugan);
					myform.pay2.value = parseInt(gongim) + parseInt(sobi) + parseInt(gugan);
				}
			} else if(mode == "insert") {
				if(vat == "Y") {
					sobi_a = parseInt(sobi)/parseInt(i);
					sobi_all = parseInt(sobi) + parseInt(sobi_a);
					gongim_a = parseInt(gongim)/parseInt(i);
					gongim_all = parseInt(gongim) + parseInt(gongim_a);

					myform.pay1.value = parseInt(gongim_all) + parseInt(sobi_all) + parseInt(gugan);
					myform.pay2.value = parseInt(gongim_all) + parseInt(sobi_all) + parseInt(gugan);
				} else {
					myform.pay1.value = parseInt(gongim) + parseInt(sobi) + parseInt(gugan);
					myform.pay2.value = parseInt(gongim) + parseInt(sobi) + parseInt(gugan);
				}
			} else {
				alert("오류발생!! 다시시도해 주시기 바랍니다.");
				return;
			}
		} else {
			alert("청구금액계산을 먼저 실행해 주시기 바랍니다.");
			return;
		}
	}

	function exists_model(m_id) {
		var sc = $("#sub_cnt").val() ;
		var ck='F';
		for(var i=0;i < sc; i++) {
			if($("#s_no_"+i).val() == "" || $("#s_no_"+i).val()==undefined) {
				// 모델품번이 존재하지 않기때문에 삭제된 값으로 판단
				continue ;
			} else {
				// 진행가능
				if($("#s_no_"+i).val() == m_id) ck='T';
			}
		}
		return ck ;
	}

		}else if($("#pay_gbn").val() == "" ) {
			alert("요금구분은 필수값입니다.");
			$("#pay_gbn").focus();
			return;
		}
		
		//수량에는 숫자만 입력되도록 추가할것.
		if(m != 't') {
			var inputVal = $("#s_cnt_"+s).val();
    		$("#s_cnt_"+s).val(inputVal.replace(/[^0-9]/gi,''));
		}
		var param = "&mode=jajea_price&sc="+s+"&stype="+$("#s_type_"+s).val()+"&sno="+$("#s_no_"+s).val()+"&pay_gbn="+$("#pay_gbn").val();
		ajaxLoader("ajax_proc.php?"+param);
	}

	//ajax응답처리 함수
	function ajaxResponse(respose){
		var mode_str = respose.split("^");
		switch(mode_str[0]){
			case "ERRORSEL" :	//장애코드 선택
				var str = mode_str[1].split("||");
				var cnt = str.length ;
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = str[i].split("@");
						if(i == 0) $("#err_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#err_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;

			case "REPAIRSEL" :	//수리코드 선택
				var str = mode_str[1].split("||");
				var cnt = str.length ;
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = str[i].split("@");
						if(i == 0) $("#suri_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#suri_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;

			case "CAUSESEL" :	//원인코드 선택
				var str = mode_str[1].split("||");
				var cnt = str.length ;
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = str[i].split("@");
						if(i == 0) $("#resion_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#resion_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;

			case "SEL_AGENCY" :
				var sel_str = mode_str[1].split("||");
				var cnt = sel_str.length ;
				for(var i=0; i < cnt ; i++) {
					if(sel_str[i] != '') {
						var sel = sel_str[i].split("@");
						if(i == 0) $("#ps_agent").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#ps_agent").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;

			case "svcPayChange" :	//출장비 계산
				//alert(respose);
				if(mode_str[1] == "") mode_str[1] = 0;
				$("input[name='price_gugan']").val(mode_str[1]);
			break;

			case "jajea_price" :		//자재가격 보여주기
				if(mode_str[2] == "") mode_str[2] = 0 ;
				$("#j_price_"+mode_str[1]).val(mode_str[2]);
				
				var cnt = $("#s_cnt_"+mode_str[1]).val();	//수량
				var price = $("#j_price_"+mode_str[1]).val();	//소비자가격 
				if(cnt == 0) {
					//alert("수량이 0 입니다.");
					$("#s_cnt_"+mode_str[1]).val('');
					$("#s_cnt_"+mode_str[1]).focus();
					return;
				}
				var total = parseInt(price) * parseInt(cnt);
				if(isNaN(total) == false) {
					//무상일 경우는 자재비도 0원이다.
					if($("#pay_gbn").val() == 'N') {
						$("#s_price_"+mode_str[1]).val(0);
					} else {
						$("#s_price_"+mode_str[1]).val(total);	//금액계산처리
					}
				} else {
					alert("소비자가격이 없습니다.");
					$("#s_price_"+mode_str[1]).val(0);	//금액계산처리
				}
			break;

			case "reset" : 	//초기화할시
				alert("초기화 되었습니다.");
				location.href="/html/resolve_year_mode.php?num=&mode=insert&rno="+mode_str[1];
			break;

			default :
				alert(respose);
			break;
		}
	}
