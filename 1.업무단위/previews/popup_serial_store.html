<script type="text/javascript">
	function go_submit(cnt) {
		var myform = document.hform ;
		//alert(myform.mode.value);
		var msg = "";
		var s_cnt=0;
		for(var i=0; i < cnt ; i++) {
			if($("#serial_"+i).val() != "" ){ 
				if($("#serial_type_").val() == "") {
					alert("등급을 선택해주세요!");
					$("#serial_type_").focus();
					return;
				}
				s_cnt++;
			}
		}
				
		msg += "반납 : "+s_cnt+"\r\n";
		msg += "미반납 : "+parseInt(cnt - s_cnt)+"\r\n\r\n";
		msg += "반납신청 하시겠습니까?";
		
		if(confirm(msg)) {
			myform.scnt.value = parseInt(cnt - s_cnt) ;
			myform.action = "popup_serial_store_proc.php";
			myform.submit();
		}
	}
</script>
