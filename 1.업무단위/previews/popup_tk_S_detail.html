<script type="text/javascript">
// 호 삭제
function del_S_U(idx,yn,sidx)
{
	var myform = document.hform;
	var apt_no = myform.apt_no.value;
	var dong = myform.dong.value;
	var tkman = myform.tkman.value;
	var tkuser = myform.tkuser.value;

	var msg = "선택하신 호를 삭제하시겠습니까?";

	if(yn == "Y") {
		alert("선택하신 호는 이미 완료처리가 되어서 삭제하실수 없습니다.");
	} else {
		if(confirm(msg)) {
			ajaxLoader("ajax_proc.php?mode=tk_delete_S&apt_no="+apt_no+"&dong="+dong+"&tkman="+tkman+"&idx="+idx+"&tkuser="+tkuser+"&sidx="+sidx);
		}
	}
}

// 호 삭제 respone
function ajaxResponse(respose)
{
	//alert(respose);
	var mode_str = respose.split("^");

	switch(mode_str[0]) {
		case "tk_del_S_ok" :
			alert("선택하신 호가 삭제되었습니다.");
			location.reload();
		break;
		case "tk_del_S_false" :
			alert("삭제가 실패하였습니다. 다시 시도해 주시기 바랍니다.");
		break;
	}
}
</script>
