<script type='text/javascript'>
	var post_val="";
	var addr_val="";
	var apt_val="";

	function go_next(){
		if($("input[name=address]").val() ==''){
				alert("검색하실 동을 입력해주세요.");
				$("input[name=address]").focus();
				return;
		}
		if($("#road_addr:checked").val() == "1"){
				$("input[name=mode]").val('road_search');
		}else{
				$("input[name=mode]").val('search');
		}
		$("form[name=addr]").submit();
	}
	function addr_next(post,addr,apt){
		var req = '';
		if(req == ''){
			opener.document.eForm.postno.value = post.length == 6 ? 
				post.substring(0,3) + '-' + post.substring(3,6) : post;
			opener.document.eForm.addr1.value = addr;
			opener.document.eForm.addr2.value = apt;
			opener.document.eForm.addr2.select();

		}else if(req == 'btnFindAddress1'){
			opener.order_form.txtDeliveryPost.value = post.length == 6 ? 
				post.substring(0,3) + '-' + post.substring(3,6) : post;
			opener.order_form.txtDeliveryAddr1.value = addr;
			opener.order_form.txtDeliveryAddr2.value = apt;
			opener.order_form.txtDeliveryAddr2.select();
			opener.location.href="javascript:addr_save1();";

		}else if(req == 'btnFindAddress2'){
			$('#txtReqPost',opener.document).val( post.length == 6 ? 
				post.substring(0,3) + '-' + post.substring(3,6) : post);
			$('#txtReqAddr1',opener.document).val( addr );
			$('#txtReqAddr2',opener.document).val( apt );
			$('#txtReqAddr2',opener.document).select();

		}else if(req == 'btnFindAddress3'){
			opener.order_form.txtPresentPost.value = post.length == 6 ? 
				post.substring(0,3) + '-' + post.substring(3,6) : post;
			opener.order_form.txtPresentAddr1.value = addr;
			opener.order_form.txtPresentAddr2.value = apt;
			opener.order_form.txtPresentAddr2.select();
			opener.location.href="javascript:addr_save3();";

		}

		self.close();
	}
	//2014-06-09 wonkyu 주소 선택시 주소저장버튼으로만 값 저장하기 
	function addr_next2(post,addr,apt){
		
			$("#rest_addr_tr").css("display","");
			$("#address").val(addr);
			$("#rest_addr").val(apt);
			
			addr_val=addr;
			post_val=post;
			apt_val=apt;
		

	
	}
	function go_save(){
		if($("#rest_addr").val() ==''){
			alert("나머지주소(번지)을 입력해주세요.");
			$("#rest_addr").focus();
			return;
		}
		

		addr_next(post_val,addr_val,$("#rest_addr").val());
		
		}
	
	function go_keycode(e){
		if(e.keyCode == 13){
			go_next();
		}else if(e.keyCode == 27){
			self.close();
		}
	}
	function go_keycode2(e){
		if(e.keyCode == 13){
			go_save();
		}else if(e.keyCode == 27){
			self.close();
		}
	}

	$(function(){
			$("input[name=address]").select();
	});

</script>
</head>
