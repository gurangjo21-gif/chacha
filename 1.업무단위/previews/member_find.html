<script type="text/javascript">
	function movedata(unum,uname,tel,hp,zip,addr1,addr2,apt,apt_name,callprice){
		var f = opener.document.receipt_form;

		f.mb_name.value=uname;
		f.zip.value=zip;
		f.addr1.value=addr1;
		f.addr2.value=addr2;
		f.apt_no.value=apt;
		f.apt_name.value=apt_name;
		f.callprice.value=callprice;
		f.custNUM.value=unum;	//kms 고객번호 넘기기 주석 해제(접수둥록에서 기존에 접수된 고객일 경우 처리용)

		if(tel){
			var sp_telNUM = tel.split('-');
			f.phone1.value = sp_telNUM[0];
			f.phone2.value = sp_telNUM[1];
			f.phone3.value = sp_telNUM[2];
		}
		if(hp){
			var sp_cellNUM = hp.split('-');
			f.mobile1.value = sp_cellNUM[0];
			f.mobile2.value = sp_cellNUM[1];
			f.mobile3.value = sp_cellNUM[2];
		}

		//처리지점&처리사원 선택
		if(zip)opener.ZIP_SELECT(zip);
		//if(zip)opener.dynamic.src="../common/selectLoad.php?RUN=ZIP_SELECT&form=receipt_form&zip=" + zip;
		window.close();
	}
	
	function go_next() {
		var findStr = document.search_form.find.value;
		var keyword = document.search_form.keyword.value;
		location.href="/html/member_find.php?find="+findStr+"&keyword="+keyword;
	}
	function winResize(){
	  width  = parseInt(document.body.clientWidth -  document.images[0].width)-5;
	  height = parseInt(document.body.clientHeight -  document.images[0].height)+70;
	  window.resizeTo(width,height)
	}


</script>
