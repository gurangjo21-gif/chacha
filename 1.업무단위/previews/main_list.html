	$(function(){
		/* 클릭 클릭시 클릭을 클릭한 위치 근처에 레이어가 나타난다. */
		$('.tooltip').click(function(e){
			//alert($(this).attr('title'));
			var sWidth = window.innerWidth;
			var sHeight = window.innerHeight;

			var oWidth = $('.popupLayer').width();
			var oHeight = $('.popupLayer').height();

			// 레이어가 나타날 위치를 셋팅한다.
			var divLeft = e.clientX + 10;
			var divTop = e.clientY + 5;

			// 레이어가 화면 크기를 벗어나면 위치를 바꾸어 배치한다.
			if( divLeft + oWidth > sWidth ) divLeft -= oWidth;
			if( divTop + oHeight > sHeight ) divTop -= oHeight;

			// 레이어 위치를 바꾸었더니 상단기준점(0,0) 밖으로 벗어난다면 상단기준점(0,0)에 배치하자.
			if( divLeft < 0 ) divLeft = 0;
			if( divTop < 0 ) divTop = 0;
			
			$("#tooltip_content").html($(this).attr('value'));

			$('.popupLayer').css({
				"top": divTop,
				"left": divLeft,
				"position": "absolute"
			}).show();
		});
		$( "#sday" ).datepicker({
	    	dateFormat: 'yy-mm-dd'
	    });
	    $( "#eday" ).datepicker({
	    	dateFormat: 'yy-mm-dd'
	    });
	});
	// 팝업 다른데 클릭시 레이어 닫기
	$(document).mouseup(function (e) {
		var container = $("#popupLayer");
		if (!container.is(e.target) && container.has(e.target).length === 0){
			$('.popupLayer').hide();
		}	
	});
	
	function closeLayer(){
			$('.popupLayer').hide();
		}


	function n_detail_mode(idx) {
		if($("#n_detail_"+idx).css("display") == "none"){
			$("#n_detail_"+idx).css("display","");
			
			//읽음 카운트 +1
			ajaxLoader("ajax_proc.php?mode=forum_notice_count&idx="+idx);
		}else{

		}
	}

	function p_detail_mode(idx)

	function detail_mode(idx)

		else

		}
	}
