	function go_next(mode){
		var myform = document.input_form ;

			if(confirm("취소하시겠습니까?")){

				myform.rcnt.focus();
				return ;
			}
			myform.action = "resolve_year_proc.php";
			myform.submit();
		}
		return;
	}
	
	function svcPayChange() {
		var myform = document.input_form;
		var pay = myform.pay_gbn.value;
		var gupay = myform.gugan.value;

		if(pay == "Y")
		{
			switch(gupay) {
				case "1구간" :
					myform.price_gugan.value = "15000";
				break;
				case "2구간" :
					myform.price_gugan.value = "20000";
				break;
				case "3구간" :
					myform.price_gugan.value = "25000";
				break;
				case "4구간" :
					myform.price_gugan.value = "30000";
				break;
				case "5구간" :
					myform.price_gugan.value = "35000";
				break;
				case "6구간" :
					myform.price_gugan.value = "40000";
				break;
				default :
					myform.price_gugan.value = "15000";
				break;
			}
		}
		else
		{
			myform.price_gugan.value = "0";
			myform.pay1.value = "0";
			myform.pay2.value = "0";
		}
	}

	function price_sum() {
		var myform = document.input_form;
		var sc1 = myform.price_gongim.value;
		var sc2 = myform.price_gugan.value;
	//	var sc1 = $("#price_gongim").val();
	//	var sc2 = $("#price_gugan").val();
//		var sum = myform.pay1.value;
		myform.pay1.value = parseInt(sc1) + parseInt(sc2);
		myform.pay2.value = parseInt(sc1) + parseInt(sc2);
//		sum = sc1 + sc2;
	}

	//ajax응답처리 함수
	function ajaxResponse(respose){
		var mode_str = respose.split("^");
		switch(mode_str[0]){
			case "ERRORSEL" :	//장애코드 선택
				var str = mode_str[1].split("||");
				var cnt = str.length ;
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = str[i].split("@");
						if(i == 0) $("#err_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#err_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;
			case "REPAIRSEL" :	//수리코드 선택
				var str = mode_str[1].split("||");
				var cnt = str.length ;
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = str[i].split("@");
						if(i == 0) $("#suri_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#suri_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;
			case "CAUSESEL" :	//원인코드 선택
				var str = mode_str[1].split("||");
				var cnt = str.length ;
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = str[i].split("@");
						if(i == 0) $("#resion_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#resion_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;
			case "SEL_AGENCY" :
				var sel_str = mode_str[1].split("||");
				var cnt = sel_str.length ;
				for(var i=0; i < cnt ; i++) {
					if(sel_str[i] != '') {
						var sel = sel_str[i].split("@");
						if(i == 0) $("#ps_agent").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#ps_agent").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;
			default :
				alert(respose);
			break;
		}
	}
