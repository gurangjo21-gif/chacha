	//ajax응답처리 함수
	function ajaxResponse(respose){
		//alert(respose);
		var str = respose.split("^");

		switch(str[0]){
			case "ok" :
				alert("해피콜 처리되었습니다.");
				opener.search_next();
				self.close();
			break;
			case "false" :
				alert("오류!!! 다시 시도해주세요.");
			break;
			
			case "REPAIRSEL" :
				var sel_str = str[1].split("||");
				//alert(sel_str);
				var cnt = sel_str.length ;
				for(var i=0; i < cnt ; i++) {
					if(sel_str[i] != '') {
						var sel = sel_str[i].split("@");
						if(i == 0) $("#rc_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#rc_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;

			case "REPAIRSEL1" :		//수리코드 값이 있을때 선택되도록 처리
				var sel_str = str[1].split("||");
				var cnt = sel_str.length ;
				
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = sel_str[i].split("@");						
						if(i == 0) $("#rc_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#rc_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						
						$("#rc_2").val(str[2]).attr("selected","selected");
					}
				}
			break;
			case "CAUSESEL" :
				var sel_str = str[1].split("||");
				//alert(sel_str);
				var cnt = sel_str.length ;
				for(var i=0; i < cnt ; i++) {
					if(sel_str[i] != '') {
						var sel = sel_str[i].split("@");
						if(i == 0) $("#cs_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#cs_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;
			case "CAUSESEL1" :		//원인코드 값이 있을때 선택되도록 처리
				var sel_str = str[1].split("||");
				var cnt = sel_str.length ;
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = sel_str[i].split("@");						
						if(i == 0) $("#cs_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#cs_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						
						$("#cs_2").val(str[2]).attr("selected","selected");
					}
				}
			break;
			case "SEL_AGENCY" :
				var sel_str = str[1].split("||");
				//alert(sel_str);
				var cnt = sel_str.length ;
				for(var i=0; i < cnt ; i++) {
					if(sel_str[i] != '') {
						var sel = sel_str[i].split("@");
						if(i == 0) $("#ps_agent").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#ps_agent").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;
			
			case "svcPayChange" :	//출장비 계산
				//alert(respose);
				if(str[1] == "") str[1] = 0;
				$("input[name='price_gugan']").val(str[1]);
			break;
			
			case "jajea_price" :		//자재가격 보여주기
				if(str[2] == "") str[2] = 0 ;
				$("#j_price_"+str[1]).val(str[2]);
				
				var cnt = $("#s_cnt_"+str[1]).val();	//수량
				var price = $("#j_price_"+str[1]).val();	//소비자가격 
				if(cnt == 0) {
					//alert("수량이 0 입니다.");
					$("#s_cnt_"+str[1]).val('');
					$("#s_cnt_"+str[1]).focus();
					return;
				}
				var total = parseInt(price) * parseInt(cnt);
				if(isNaN(total) == false) {
					//무상일 경우는 자재비도 0원이다.
					if($("#pay_gbn").val() == 'N') {
						$("#s_price_"+str[1]).val(0);
					} else {
						$("#s_price_"+str[1]).val(total);	//금액계산처리
					}
				} else {
					alert("소비자가격이 없습니다.");
					$("#s_price_"+str[1]).val(0);	//금액계산처리
				}
			break;
			
			case "reset" : 	//초기화할시
				alert("초기화 되었습니다.");
				location.href="/html/popup_svc_cancel.php?num=&mode=insert&rno="+str[1];
			break;
			
			default:
				alert(respose);
			break;
		}
	}

	// 증복되는 자품번 추가한게 있는지 체크
	function exists_model(m_id) {
		var sc = $("#sub_cnt").val() ;
		var ck='F';
		for(var i=0;i < sc; i++) {
			if($("#s_no_"+i).val() == "" || $("#s_no_"+i).val()==undefined) {
				// 모델품번이 존재하지 않기때문에 삭제된 값으로 판단
				continue ;
			} else {
				// 진행가능
				if($("#s_no_"+i).val() == m_id) ck='T';
			}
		}
		return ck ;
	}
	// 자재계리 등급을 변경할때마다 그에따른 소비자가를 가져와서 들고있는다.. 청구금액 계산을 위함
	function price_change(s,m) {
		if($("#s_type_"+s).val() == '') {
			alert("등급은 꼭 필요한 값입니다.");
			$("#s_type_"+s).focus();
			return;
		}else if($("#pay_gbn").val() == "" ) {
			alert("요금구분은 필수값입니다.");
			$("#pay_gbn").focus();
			return;
		}
		
		//수량에는 숫자만 입력되도록 추가할것.
		if(m != 't') {
			var inputVal = $("#s_cnt_"+s).val();
    		$("#s_cnt_"+s).val(inputVal.replace(/[^0-9]/gi,''));
		}
		var param = "&mode=jajea_price&sc="+s+"&stype="+$("#s_type_"+s).val()+"&sno="+$("#s_no_"+s).val()+"&pay_gbn="+$("#pay_gbn").val();
		ajaxLoader("ajax_proc.php?"+param);
	}
	// 자재계리 품목 추가
	function insert_model(m_id , m_name) {
		var sc = $("#sub_cnt").val() ;
		
		var str = "<tr id='tr_"+sc+"'>"
			+"<Td><input type='text' name='s_no_"+sc+"' id='s_no_"+sc+"' value='"+m_id+"' style='width:60px;' readonly></td>"
			+"<Td>"+m_name+"</td>"
			+"<td>"
				+"<select name='s_type_"+sc+"' id='s_type_"+sc+"'  style='width:60px;' onchange=\"price_change("+sc+",'t')\">"
					+"<option value=''>--선택--</option>"
					+"<option value='A'>A등급</option>"
					+"<option value='R'>R등급</option>"
				+"</select>"
			+"<input type='hidden' name='j_price_"+sc+"' id='j_price_"+sc+"' value='0'></td>"
			+"<td><input type='text' name='s_cnt_"+sc+"' id='s_cnt_"+sc+"' value='0' style='width:60px;text-align:right;padding-right:5px;' onkeypress='price_change("+sc+")'></td>"
			+"<td><input type='text' name='s_price_"+sc+"' id='s_price_"+sc+"' value='0' style='width:60px;text-align:right;padding-right:5px;' readonly></td>"
			+"<TD><a href=\"javascript:update_next('"+sc+"','delete')\" class='btn1 btn-sms btn-color5' title='삭제'><span class='bg'>&nbsp;</span><span class='text'>삭제</span></a></TD>"
		    +"</tr>";
		    //alert(str);
		var tf = exists_model(m_id);

		if(tf == 'F') {
			$("#tr_content").append(str);
			$("#sub_cnt").val(parseInt(sc)+1);	//tr 아이디주기위해 존재
		} else {
			alert("이미 추가된 자재품번입니다. \r\n\r\n다른 자재를 선택해주세요.");
			return ;
		}
	}
	function update_next(i,mode) {
		if(mode=='delete') {
			$("#tr_"+i).remove() ;	//해당열삭제
			var sc = $("#sub_cnt2").val() ;
			$("#sub_cnt2").val(parseInt(sc)+1);	//삭제한게 몇개인지 확인을 위함
		}
	}
</script>
