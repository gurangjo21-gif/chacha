	//kms 선택처리 체크박스로 수정
	function selectitem(){
		var count = 0;
		var result = true;
		$('input:checkbox[name="select_call"]').each(function(){
			if(this.checked){
				var str = this.value.split("||");
				var mid = str[0];
				var mtitle = str[1];
				count++;

				//중복 체크
				var tf = opener.exists_model(mid);
				if(tf != 'F') {
					alert("이미 추가된 자재품번입니다. 다른 자재를 선택해주세요.\r\n\r\n* 품번:"+mid +"\r\n* 품명:"+mtitle);
					result = false;
					return false;
				}		
				
				opener.insert_model(mid, mtitle);
			}
		});

		if(count == 0){
			alert("추가할 자재를 선택해주세요.");
			return;
		}

		if(result == true){
			self.close();
		}
	}
	//kms 전체선택 추가
    function all_check() {
	    if($('#allagree').is(":checked") == true){
	       $('input:checkbox[name="select_call"]').attr("checked",true);
		   $('#allagree').attr("checked",false);
		   $('#select_label').attr("title", "전체해제");
	    }else {
           $('input:checkbox[name="select_call"]').attr("checked",false);
		   $('#allagree').attr("checked",true);
		   $('#select_label').attr("title", "전체선택");
        }
 	}
	///

	function search_next() {
		var myform = document.hform ;
		myform.submit();
	}
</script>
