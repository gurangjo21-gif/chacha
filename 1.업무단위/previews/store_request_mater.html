<script type='text/javascript'>
	function sub(no){
		if(eval("list_form.puse"+no+".value") || eval("list_form.pmemo"+no+".value"))if(!confirm("입력된 내용이 있습니다. 삭제하시겠습니까?"))return ;
		var val = list_form.val.value;
		var save="";
		var arr = val.split(';');
		var cnt = arr.length;

		for(var i=0;i<cnt;i++){
			if(arr[i]!=no && arr[i]){
					save+=arr[i] + ";";
			}
		}
		list_form.val.value = save;
		list_form.submit();
	}
</script>
