<script type="text/javascript">
	function go_submit(cnt) {
		var myform = document.hform ;
		//alert(myform.mode.value);
		var msg = "";
		var s_cnt=0;
		for(var i=0; i < cnt ; i++) {
			/*if($("#serial_"+i).val() == "" && $("#serial_type_"+i).val() == "") {
				alert("시리얼을 입력해 주세요.");
				$("#serial_"+i).focus();
				return ;
			} else {*/
				if($("#serial_"+i).val() != "" ){ 
					if($("#serial_type_"+i).val() == "" ){
						alert("출고등급을 선택해주세요.");
						$("#serial_type_"+i).focus();
						return ;
					}else {
						s_cnt++;
					}
				}else if($("#serial_type_"+i).val() != "" ){
					if($("#serial_"+i).val() == "" ){ 
						alert("시리얼을 입력해주세요.");
						$("#serial_"+i).focus();
						return ;
					}
				}
			//}
		}
		if(s_cnt == '0' || s_cnt == null) {
			alert("시리얼을 입력해 주세요");
			return;
		} else {
			//exit;
			//alert($("#serial_"+i).val());
			msg += "출고 : "+s_cnt+"\r\n";
			msg += "미출고 : "+parseInt(cnt - s_cnt)+"\r\n\r\n";
			msg += "등록하시겠습니까?";
			
			if(confirm(msg)) {
				myform.scnt.value = parseInt(cnt - s_cnt) ;
				myform.action = "popup_serial_proc.php";
				myform.submit();
			}
		}
	}

	// 출고예정일 등록
	function expected_next() {
		var myform = document.hform;
		var idx = myform.idx.value;
		var sid = myform.sid.value;
		var expected = myform.expected.value;

		var param = "mode=expected_next&form=hform&idx="+idx+"&sid="+sid+"&expected="+expected;
		ajaxLoader("ajax_proc.php?"+param);
	}

	function update_next(idx,sid,mid,cnt){
		var myform = document.hform ;
		myform.action = "popup_return.php";
		myform.submit();
	}
	$(function(){	
		$( "#expected" ).datepicker({
	    	dateFormat: 'yy-mm-dd'
	    });
	});

	function ajaxResponse(respose){
		//return 없음
		//alert(respose);
		var mode_str = respose.split("^");

		switch(mode_str[0]) {
			case "expected_ok" :
				alert("출고예정일이 등록되었습니다.");
				location.reload();
			break;
			case "expected_false" :
				alert("출고예정일 등록이 실패하였습니다. 다시시도해 주시기 바랍니다.")
				return;
			break;
			default :
				alert(respose);
			break;
		}
	}
</script>
