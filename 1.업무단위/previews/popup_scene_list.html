<script type='text/javascript'>
	var obtype = getCookie('ob_type');

	function monitor() {
		ajaxLoader('../dao/admin_scene_list.php?ob_type='+obtype);
	}
	
	function search_next(){
		var myform = document.eForm ; 
		myform.pageno.value = 1 ;
		myform.action = "/html/popup_scene_list.php";
		myform.target="";
		myform.submit();
	}

	function search_next_sort(){
		setTimeout("search_next()",500);
	}
	function update_next(idx,mode){
		var myform = document.eForm ;
		myform.idx.value = idx;
		myform.mode.value = mode;
		if(mode == 'detail') {
			myform.action = "popup_scene_detail.php";
		} else {
			myform.action = "popup_scene_mode.php";
		}
		myform.target="";
		myform.submit();
	}
	function bDel_next(idx){
		var msg = "삭제 하시겠습니까?";
		if(confirm(msg)){
			ajaxLoader("ajax_proc.php?mode=admin_scene_del&idx="+idx);
		}
	}

	//ajax응답처리 함수
	function ajaxResponse(respose){
		var mode_str = respose.split("^");
		switch(mode_str[0]){
			case "ok": 
				alert("삭제 되었습니다.");
				search_next();
			break;
			case "false": 
				alert("오류!!! 다시 시도해주세요.");
				search_next();
			break;
		}
	}
	
	function excel_download(){
		var myform = document.eForm ;
		var esort = myform.esort.value;
		myform.action = "../excel/admin_scene_list.php?ob_type"+esort;
		//myform.target = "ifrm_trans";
		myform.target = "";
		myform.submit();
	}

$(function () {
	monitor();
	//alert(obtype);

	$('[id^=orderby_]').css('cursor','pointer');

	if( obtype==null){
		$("#orderby_no .arrow").text('▲');
		obtype = 'no_asc';
	}else{
		switch(obtype)
		{
			case 'no_asc':	$('#orderby_no .arrow').text('▲');	break;
			case 'no_desc':	$('#orderby_no .arrow').text('▼');	break;
			case 'ap_asc':	$('#orderby_apt .arrow').text('▲');	break;
			case 'ap_desc':	$('#orderby_apt .arrow').text('▼');	break;
			case 'sc_asc':	$('#orderby_scene .arrow').text('▲');	break;
			case 'sc_desc':	$('#orderby_scene .arrow').text('▼');	break;
			case 'ma_asc':	$('#orderby_manager .arrow').text('▲');	break;
			case 'ma_desc':	$('#orderby_manager .arrow').text('▼');	break;
			case 'md_asc':	$('#orderby_model .arrow').text('▲');	break;
			case 'md_desc':	$('#orderby_model .arrow').text('▼');	break;
			case 'cn_asc':	$('#orderby_center .arrow').text('▲');	break;
			case 'cn_desc':	$('#orderby_center .arrow').text('▼');	break;
			default: $('#orderby_no .arrow').text('▲'); break;
		}
	}

	$('#orderby_no').click(function(){
			if(obtype == 'no_asc'){
					obtype = 'no_desc';
					$('#orderby_no .arrow').text('▼');
			}else{
					$('[id^=orderby_] .arrow').text('');;
					obtype = 'no_asc';
					$('#orderby_no .arrow').text('▲');
			}
			setCookie('ob_type',obtype);
	});

	$('#orderby_apt').click(function(){
			if(obtype == 'ap_asc'){
					obtype = 'ap_desc';
					$('#orderby_apt .arrow').text('▼');
			}else{
					$('[id^=orderby_] .arrow').text('');;
					obtype = 'ap_asc';
					$('#orderby_apt .arrow').text('▲');
			}
			setCookie('ob_type',obtype);
	});

	$('#orderby_scene').click(function(){
			if(obtype == 'sc_asc'){
					obtype = 'sc_desc';
					$('#orderby_scene .arrow').text('▼');
			}else{
					$('[id^=orderby_] .arrow').text('');;
					obtype = 'sc_asc';
					$('#orderby_scene .arrow').text('▲');
			}
			setCookie('ob_type',obtype);
	});

	$('#orderby_manager').click(function(){
			if(obtype == 'ma_asc'){
					obtype = 'ma_desc';
					$('#orderby_manager .arrow').text('▼');
			}else{
					$('[id^=orderby_] .arrow').text('');;
					obtype = 'ma_asc';
					$('#orderby_manager .arrow').text('▲');
			}
			setCookie('ob_type',obtype);
	});

	$('#orderby_model').click(function(){
			if(obtype == 'md_asc'){
					obtype = 'md_desc';
					$('#orderby_model .arrow').text('▼');
			}else{
					$('[id^=orderby_] .arrow').text('');;
					obtype = 'md_asc';
					$('#orderby_model .arrow').text('▲');
			}
			setCookie('ob_type',obtype);
	});

	$('#orderby_center').click(function(){
			if(obtype == 'cn_asc'){
					obtype = 'cn_desc';
					$('#orderby_center .arrow').text('▼');
			}else{
					$('[id^=orderby_] .arrow').text('');;
					obtype = 'cn_asc';
					$('#orderby_center .arrow').text('▲');
			}
			setCookie('ob_type',obtype);
	});
});
