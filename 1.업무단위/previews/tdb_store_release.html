	function update_next(i,mode) {
		if(mode=='delete') {
			var st = $("#ridx_"+i).val() ;	//해당열 일련번호 - 삭제시 DB변경처리
			//alert(st);

				ajaxLoader("ajax_proc.php?mode=tdb_store_release&idx="+st+"&tr="+i);

			}
		} else if(mode =='update') {

			var st3 = $("#s_cnt_"+i).val() ;	// 신청수량
			var st4 = $("#td_store_"+i).html() ;	// 출고수량
			var st5 = $("#td_nostore_"+i).html() ;	//미출고량
			
			var msg = "";
			switch(st1) {
				case '1' : msg = "접수대기"; break;
				case '2' : msg = "출고대기"; break;
				case '3' : msg = "출고완료"; break;
				case '4' : msg = "미출고"; break;
				case '5' : msg = "부분출고"; break;
			}
			if(confirm("상태값을 ["+msg+"] 로 변경 하시겠습니까?")){				
				ajaxLoader("ajax_proc.php?mode=tdb_store_release_update&idx="+st+"&st1="+st1+"&st2="+st2);	
			}
		}
	}
	//ajax응답처리 함수
	function ajaxResponse(respose){
		//return 없음
		//alert(respose);
		var str = respose.split("^");
		if(str[0] == 'upd_ok') {

			go_next(str[1]);
		}else if(str[0] =='del_ok') {
			alert("삭제되었습니다.");
			$("#tr_"+str[1]).remove() ;	//해당열삭제
		}
	}

		}
	}
