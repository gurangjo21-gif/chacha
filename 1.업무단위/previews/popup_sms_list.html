<script type="text/javascript">
	//ajax
	function ajaxLoader(url){ 
		if (document.getElementById) { 
			var xmlHttp = (window.ActiveXObject) ? new ActiveXObject("Microsoft.XMLHTTP") : new XMLHttpRequest(); 
		}
		if (xmlHttp){ 
			xmlHttp.onreadystatechange = function(){ 
				if (xmlHttp.readyState == 4){// 객체의 상태(0:비초기화, 1:로딩, 3:상호작용, 4: 완료)
					if(xmlHttp.status == 200){ 
						ajaxResponse(xmlHttp.responseText); 
					}else{
						alert('시스템 오류. CODE :'+ xmlHttp.status);
					}
				} 
			} 
			xmlHttp.open("GET", url, true); 
			xmlHttp.send(null); 
		}else{
			alert("지원되지 않는 브라우저입니다.");
		}
	} 
	function search_next() {
		var myform = document.searchForm ;
		myform.submit();
	}
	function re_send(reciever,i,sender,callback) {
		if(confirm("재전송 하시겠습니까?")){
			
			//var snd_msg = $("#snd_msg_"+i).val();
			ajaxLoader("ajax_proc.php?mode=sms_resend&reciever="+reciever+"&sender="+sender+"&callback="+callback);
		}
	}
	function sms_go() {
		window.open("popup_sms.php",'sms_go','width=565,height=475');
	}
	//ajax응답처리 함수
	function ajaxResponse(respose){
		//alert(respose);
		var mode_str = respose.split("^");
		switch(mode_str[0]){
			case "ok": 
				alert("재전송 되었습니다.");
			break;
			case "false": 
				alert("오류!!! 다시 시도해주세요.");
			break;
		}
	}
	$(function(){
		/* 클릭 클릭시 클릭을 클릭한 위치 근처에 레이어가 나타난다. */
		$('.tooltip').mouseover(function(e){
			//alert($(this).attr('title'));
			var sWidth = window.innerWidth;
			var sHeight = window.innerHeight;

			var oWidth = $('.popupLayer').width();
			var oHeight = $('.popupLayer').height();

			// 레이어가 나타날 위치를 셋팅한다.
			var divLeft = e.clientX + 10;
			var divTop = e.clientY + 5;

			// 레이어가 화면 크기를 벗어나면 위치를 바꾸어 배치한다.
			if( divLeft + oWidth > sWidth ) divLeft -= oWidth;
			if( divTop + oHeight > sHeight ) divTop -= oHeight;

			// 레이어 위치를 바꾸었더니 상단기준점(0,0) 밖으로 벗어난다면 상단기준점(0,0)에 배치하자.
			if( divLeft < 0 ) divLeft = 0;
			if( divTop < 0 ) divTop = 0;
			
			$("#tooltip_content").html($(this).attr('value'));

			$('.popupLayer').css({
				"top": divTop,
				"left": divLeft,
				"position": "absolute"
			}).show();
		}).mouseout(function(){
			$('.popupLayer').hide();
		});
		/*$( "#sday" ).datepicker({
	    	dateFormat: 'yy-mm-dd'
	    });
	    $( "#eday" ).datepicker({
	    	dateFormat: 'yy-mm-dd'
	    });*/
		$( "#sday" ).datepicker({
	    	dateFormat: 'yy-mm-dd',
			monthNamesShort: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
			dayNamesMin: ['일','월','화','수','목','금','토'],
			changeMonth: true,
			changeYear: true,
			showMonthAfterYear: true
	    });
		$( "#eday" ).datepicker({
	    	dateFormat: 'yy-mm-dd',
			monthNamesShort: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
			dayNamesMin: ['일','월','화','수','목','금','토'],
			changeMonth: true,
			changeYear: true,
			showMonthAfterYear: true
	    });
	});
	// 팝업 다른데 클릭시 레이어 닫기
	$(document).mouseup(function (e) {
		var container = $("#popupLayer");
		if (!container.is(e.target) && container.has(e.target).length === 0){
			$('.popupLayer').hide();
		}	
	});
	
	function closeLayer(){
			$('.popupLayer').hide();
		}
</script>
