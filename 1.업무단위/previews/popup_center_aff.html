<script type="text/javascript">
	function ajaxLoader(url){ 
		if (document.getElementById) { 
			var xmlHttp = (window.ActiveXObject) ? new ActiveXObject("Microsoft.XMLHTTP") : new XMLHttpRequest(); 
		}
		if (xmlHttp){ 
			xmlHttp.onreadystatechange = function(){ 
				if (xmlHttp.readyState == 4){// 객체의 상태(0:비초기화, 1:로딩, 3:상호작용, 4: 완료)
					if(xmlHttp.status == 200){ 
						ajaxResponse(xmlHttp.responseText); 
					}else{
						alert('시스템 오류. CODE :'+ xmlHttp.status);
					}
				} 
			} 
			xmlHttp.open("GET", url, true); 
			xmlHttp.send(null); 
		}else{
			alert("지원되지 않는 브라우저입니다.");
		}
	}

	function search_next(val) {
		var myform = document.searchForm;
	//	ajaxLoader('../dao/popup_center_aff.php?code='+val);
		myform.action = "../html/popup_center_aff.php?code="+val;
		myform.target = "";
		myform.submit();
		//location.replace('../dao/popup_center_aff.php?code='+val);
	}

	function center_add() {
		var myform = document.searchForm;
		var center_name = myform.center_one.value;
		var aff_name = myform.center_two.value;
		ajaxLoader("ajax_proc.php?mode=aff_add&center_name="+center_name+"&aff_name="+aff_name);
	}

	function update_next(idx,mode) {
		var myform = document.searchForm;
		var center_name = myform.center_one.value;
		ajaxLoader("ajax_proc.php?mode=aff_del&center_name="+center_name+"&aff_name="+idx);
	}

	//ajax응답처리 함수
	function ajaxResponse(respose){
		var str = respose.split("^");
		switch(str[0]){
			case "ok" :
				alert("추가되었습니다.");
				location.reload();
			break;
			case "false" :
				alert("오류!!! 다시 시도해주세요.");
				return;
			break;
			case "del_ok" :
				alert("삭제 되었습니다.");
				location.reload();
			break;
			default:
				alert(respose);
			break;
		}
	}
</script>
