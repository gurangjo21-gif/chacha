<script type='text/javascript'>
	function chk_byte() {	//	문자 바이트수 체크
		var obj = document.forms["frm_handphone"];
		var bodyVal = obj.han_msg.value;
		var bodyLen = bodyVal.length;
		
		var max_len	= 90;
		var bytesLen = 0;
		var validBodyLen = 0;
		var validBytesLen = 0;

		for (var i = 0; i < bodyLen; i++) {			
			var oneChar = bodyVal.charAt(i);
			if (escape(oneChar).length > 4) {
				bytesLen += 2;
			} else if (oneChar ==='' || oneChar === '\n') {
			} else {			
				bytesLen++;
			}
			if(bytesLen <= max_len)	{
				validBodyLen = i + 1;
				validBytesLen = bytesLen;
			}
		}

		if(bytesLen > max_len) {
			//alert(max_len+"bytes 이상이면 mms로 전환됩니다.");
			//var realBodyVal = bodyVal.substr(0, validBodyLen);
			//obj.han_msg.value = realBodyVal;
			var bytesVal = validBytesLen;
			obj.sm_mm.value = "lms";
		} else {
			obj.sm_mm.value = "sms";
			bytesVal = bytesLen;
		}
		obj.han_byte.value = bytesVal + "/" + max_len;
		obj.han_msg.focus();
	}
	function reset_msg () {	//다시쓰기
		document.forms['frm_handphone'].han_msg.value="";
		document.forms['frm_handphone'].han_msg.focus();
	}
	
	
	function deleteChar(String) {	// 불필요한 데이터 제거(String)
		var pattern = /[-\[\]\{\}\(\)\\\t\.\,\|\{\}? \"\'\`\:\;]/g;//전화번호에서 불필요한 문자 
		var useStr	 = String.replace(pattern, "");
		return useStr;
	}
	
	function sms_send(){
		var obj_phone = document.forms['frm_handphone'] ;
		if(obj_phone.han_msg.value == ""){
			alert("발송할 내용을 입력해 주세요!");
			obj_phone.han_msg.focus();
			return;
		}
		if(obj_phone.han_callback.value == ""){
			alert("발신번호를 입력해 주세요!");
			obj_phone.han_callback.focus();
			return;
		}

		obj_phone.action = "sms_send_proc.php";
		obj_phone.target = "ifrm_trans";
		obj_phone.submit();
	}
</script>
