<script type="text/javascript">
	function ajaxLoader(url){ 
		if (document.getElementById) { 
			var xmlHttp = (window.ActiveXObject) ? new ActiveXObject("Microsoft.XMLHTTP") : new XMLHttpRequest(); 
		}
		if (xmlHttp){ 
			xmlHttp.onreadystatechange = function(){ 
				if (xmlHttp.readyState == 4){// 객체의 상태(0:비초기화, 1:로딩, 3:상호작용, 4: 완료)
					if(xmlHttp.status == 200){ 
						ajaxResponse(xmlHttp.responseText); 
					}else{
						alert('시스템 오류. CODE :'+ xmlHttp.status);
					}
				} 
			} 
			xmlHttp.open("GET", url, true); 
			xmlHttp.send(null); 
		}else{
			alert("지원되지 않는 브라우저입니다.");
		}
	} 
	function save(){
		if(!confirm("저장하시겠습니까?"))return false;

		var param = "mode=happy_update&oNAME="+$("input[name=oNAME]").val()+"&score="+$("select[name=score]").val()+"&oDATE="+$("input[name=oDATE]").val();
		param +="&memo="+$("textarea[name=memo]").val()+"&idx="+$("input[name=idx]").val();
		//alert(param);
		ajaxLoader("ajax_proc.php?mode=happy_update&"+param);
	}
	//ajax응답처리 함수
	function ajaxResponse(respose){
		var str = respose.split("^");
		switch(str[0]){
			case "ok" :
				alert("해피콜 처리되었습니다.");
				opener.search_next();
				self.close();
			break;
			case "false" :
				alert("오류!!! 다시 시도해주세요.");
			break;
			default:
				alert(respose);
			break;
		}
	}
	
	$(function(){		
		/*$( "#oDATE" ).datepicker({
	    	dateFormat: 'yy-mm-dd'
	    });*/
		$( "#oDATE" ).datepicker({
	    	dateFormat: 'yy-mm-dd',
			monthNamesShort: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
			dayNamesMin: ['일','월','화','수','목','금','토'],
			changeMonth: true,
			changeYear: true,
			showMonthAfterYear: true
	    });
	});
</script>
