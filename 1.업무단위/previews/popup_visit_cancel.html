<script type="text/javascript">
	function ajaxLoader(url){ 
		if (document.getElementById) { 
			var xmlHttp = (window.ActiveXObject) ? new ActiveXObject("Microsoft.XMLHTTP") : new XMLHttpRequest(); 
		}
		if (xmlHttp){ 
			xmlHttp.onreadystatechange = function(){ 
				if (xmlHttp.readyState == 4){// 객체의 상태(0:비초기화, 1:로딩, 3:상호작용, 4: 완료)
					if(xmlHttp.status == 200){ 
						ajaxResponse(xmlHttp.responseText); 
					}else{
						alert('시스템 오류. CODE :'+ xmlHttp.status);
					}
				} 
			} 
			xmlHttp.open("GET", url, true); 
			xmlHttp.send(null); 
		}else{
			alert("지원되지 않는 브라우저입니다.");
		}
	}

	// 페이지 로드시 display 설정
	function display_mode(idx,mode) {
		if(mode == "insert") {	//입력
			$("#can_in").css("display","");
			$("#can_up").css("display","none");
		}else{	//수정
			if(!confirm("코드명을 바꾸게 되면 기존 코드명으로 등록된 모든데이터의 내용이 변경됩니다.\n\n그래도 코드명 변경을 하시겠습니까?"))return false;
			$("#can_in").css("display","none");
			$("#can_up").css("display","");
			$("#idx").val($("#bcode_"+idx).text());
			$("#cancel_name").val($("#bname_"+idx).text());
			$("#bCODE").val(idx);
		}
	}

	function update_next(stat) {
		var myform = document.searchForm;

		var code = myform.bCODE.value;
		var codeName = "";
		if(stat == "update") {
			codeName = myform.cancel_name.value;
		} else {
			codeName = myform.cancel_code.value;
		}
		//alert(code+ " | "+stat+" | "+codeName);
		ajaxLoader("ajax_proc.php?mode=cancel_next&code="+code+"&stat="+stat+"&codeName="+codeName);
	}
	
	// 사용유무 변경처리
	function use_upate(code,stat){
		if (confirm('선택하신 코드'+code+'의 상태를 변경 하시겠습니까?')) {
			ajaxLoader("ajax_proc.php?mode=cancel_yn&idx="+code+"&stat="+stat);
		}
	}

	//ajax응답처리 함수
	function ajaxResponse(respose){
		var str = respose.split("^");
		switch(str[0]){
			case "cancel_insert_ok" :
				alert("추가되었습니다.");
				location.reload();
			break;
			case "cancel_insert_false" :
				alert("오류!!! 다시 시도해주세요.");
				return;
			break;
			case "cancel_update_ok" :
				alert("수정되었습니다..");
				location.reload();
			break;
			case "cancel_update_false" :
				alert("오류!!! 다시 시도해주세요.");
				return;
			break;
			case "use_ok" :
				alert("변경되었습니다.");
				location.reload();
			break;
			case "use_false" :
				alert("오류!!! 다시 시도해주세요.");
				return;
			break;
			default:
				alert(respose);
			break;
		}
	}
</script>
