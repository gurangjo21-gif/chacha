// 공용부 추가
function insertG(num,mode)

	var myform = document.eForm;
	var apt_no = myform.idx.value;
	var dong = $("#tk"+num).val();
	var tkman = myform.tkman.value;
	var tkuser = myform.tkuser.value;
	var tk_cnt = $("#tk_cnt").val();;

	for(i = 0; i < tk_cnt; i++)
	{
		var tk_u = $("#tk_u"+i).val();
		
		if(dong == tk_u) {
			alert("동은 중복으로 등록하실 수 없습니다.");
			dong.focus();
			return;
		}
	}

	if(!dong) {
		alert("동을 입력해 주시기 바랍니다.");

// AJAX respone
function ajaxResponse(respose)
{
	//alert(respose);
	var mode_str = respose.split("^");

	switch(mode_str[0]) {
		case "SEL_AGENCY" :
			var sel_str = mode_str[1].split("||");
			//alert(sel_str);
			var cnt = sel_str.length ;
			for(var i=0; i < cnt ; i++) {
				if(sel_str[i] != '') {
					var sel = sel_str[i].split("@");
					if(i == 0) $("#chargeName").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					else $("#chargeName").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
				}
			}
		break;
		case "tk_del_ok" :
			alert("선택하신 동이 삭제되었습니다.");
			location.reload();
		break;
		case "tk_del_false" :
			alert("삭제가 실패하였습니다. 다시 시도해 주시기 바랍니다.");
		break;
		case "tk_change_ok" :
			alert("TK 담당지점이 변경되었습니다.");
			location.reload();
		break;
		case "tk_change_false" :
			alert("TK 담당지점 변경이 실패하였습니다.");
		break;
	}
}
