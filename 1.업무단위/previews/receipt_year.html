<script type="text/javascript">
	
	//ajax응답처리 함수
	function ajaxResponse(respose){
		var mode_str = respose.split("^");
		switch(mode_str[0]){
			case "ERRORSEL" :
				var str = mode_str[1].split("||");
				var cnt = str.length ;
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = str[i].split("@");
						if(i == 0) $("#err_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#err_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
					}
				}
			break;
			case "ZIP_SELECT" :
				var str = mode_str[1].split("|");
				$("input[name='agency_no']").val(str[0]);	//지점코드
				$("input[name='agent_no']").val(str[1]);	//담당사원
				$("input[name='charge_agency']").val(str[2]);	//지점명
				$("input[name='u_phone']").val(str[3]);	//전화번호
				$("input[name='charge_name']").val(str[4]);	//사원명
				$("input[name='gap_gbn']").val(str[5]);	//구간구분
			break;
			case "custMOD":
				alert(mode_str[1]);
			break;
			case "ERRORSEL1" :		//값이 있을떄 선택할수있도록 하기
				var str = mode_str[1].split("||");
				var cnt = str.length ;
				for(var i=0; i < cnt ; i++) {
					if(str[i] != '') {
						var sel = str[i].split("@");						
						if(i == 0) $("#err_2").html("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						else $("#err_2").append("<option value='"+sel[1]+"'>"+sel[0]+"</option>");
						
						$("#err_2").val(mode_str[2]).attr("selected","selected");
					}
				}
			break;
			case "m_ok" :
				alert("등록 되었습니다");
				location.reload();
			break;
			case "m_end" :
				alert("처리가 완료되어 등록이 불가능합니다");
				location.reload();
			break;
			case "m_false": 
				alert("오류!!! 다시 시도해주세요");
				location.reload();
			break;
			default :
				alert(respose);
			break;
		}
	}

	//입력/수정 클릭시 이동
	function go_next(mode,com) {
		var myform = document.receipt_form ;

		if(com == "결재") {
			alert("결재가 완료된 건은 수정할 수 없습니다.");
			return;
		}

		$("input[name='mode']").val(mode);
		
		if(!myform.mb_name.value) {
			alert("고객명을 입력하세요.");
			myform.mb_name.focus();
			return ;
		}
		if(!myform.rct_date.value){
			alert("접수일자를 입력하세요.");
			myform.rct_date.focus();
			return ;
		}

		var msg = "";
		if(mode == 'insert') {
			msg = "저장하시겠습니까?";
		} else if( mode =='update') {
			msg = "수정하시겠습니까?";
		}		
		if(confirm(msg)) {
			myform.action ="popup_receipt_year_proc.php";
			myform.submit();
		}
	}
	$(function(){
		/* 클릭 클릭시 클릭을 클릭한 위치 근처에 레이어가 나타난다. */
		$('.tooltip').mouseover(function(e){
			//alert($(this).attr('title'));
			var sWidth = window.innerWidth;
			var sHeight = window.innerHeight;

			var oWidth = $('.popupLayer').width();
			var oHeight = $('.popupLayer').height();

			// 레이어가 나타날 위치를 셋팅한다.
			var divLeft = e.clientX + 10;
			var divTop = e.clientY + 5;

			// 레이어가 화면 크기를 벗어나면 위치를 바꾸어 배치한다.
			if( divLeft + oWidth > sWidth ) divLeft -= oWidth;
			if( divTop + oHeight > sHeight ) divTop -= oHeight;

			// 레이어 위치를 바꾸었더니 상단기준점(0,0) 밖으로 벗어난다면 상단기준점(0,0)에 배치하자.
			if( divLeft < 0 ) divLeft = 0;
			if( divTop < 0 ) divTop = 0;
			
			$("#tooltip_content").html($(this).attr('value'));

			$('.popupLayer').css({
				"top": divTop,
				"left": divLeft,
				"position": "absolute"
			}).show();
		//}).mouseout(function(){
		//	$('.popupLayer').hide();
		});
		/*
		$( "#rct_date" ).datepicker({
	    	dateFormat: 'yy-mm-dd'
	    });
	    $( "#rct_basedate" ).datepicker({
	    	dateFormat: 'yy-mm-dd'
	    });

	});
