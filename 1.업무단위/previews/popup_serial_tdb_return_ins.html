<script type="text/javascript">
	function go_submit(sid,cnt,cnt2) {
		var myform = document.hform ;
		var s_cnt1 = $("#store_cnt1").val();
		var s_cnt2 = $("#store_cnt2").val();

		var s_cnt3 = parseInt(s_cnt1) + parseInt(s_cnt2);
		
		if(cnt < s_cnt3) {
			alert("반납수량이 신청수량보다 많습니다.\r\n\r\n다시 입력해 주세요.");
			$("#store_cnt1").val();
			$("#store_cnt1").focus();
			return ;
		}
		/*if(s_cnt1 < s_cnt2) {
			alert("양품수량이 반납수량보다 많습니다.\r\n\r\n다시 입력해 주세요.");
			$("#store_cnt2").val('0');
			$("#store_cnt2").focus();
			return ;
		}*/
		
		var msg = "";
				
		//msg += "반납 : "+s_cnt1+" ";
		msg += "반납 : "+s_cnt3+" ";
		//msg += "미반납 : "+parseInt(cnt - s_cnt1)+"\r\n\r\n";
		msg += "미반납 : "+parseInt(cnt - s_cnt3)+"\r\n\r\n";
		//msg += "양품 : "+s_cnt2+" ";
		msg += "양품 : "+s_cnt1+" ";
		//msg += "불량 : "+parseInt(s_cnt1 - s_cnt2)+"\r\n\r\n";
		msg += "불량 : "+s_cnt2+"\r\n\r\n";
		msg += "반품신청을 하시겠습니까?";
		
		if(confirm(msg)) {
			myform.action = "popup_serial_tdb_return_ins_proc.php";
			myform.submit();
		}
	}
</script>
